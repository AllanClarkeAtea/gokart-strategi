// ── Pure JS logic (no JSX) ────────────────────────────────────────────────────
const RACE_DURATION    = 120;
const PIT_DURATION_MIN = 50 / 60;
const MIN_TOTAL_PITS   = 7;            // minimum 7 pit stops = 8 stints
const MIN_STINT        = 7;            // minutes
const MAX_STINT        = 20;           // hard rule
const PIT_BOARD_BEFORE = 1.5;          // show pit board 90 seconds (1.5 min) before planned stint end
const COLORS = ["#FF6B6B","#FFA94D","#FFE066","#69DB7C","#4DABF7","#DA77F2","#FF8FB3","#7CFFAD"];

// ─── Helpers ──────────────────────────────────────────────────────────────────
function fmt(min) {
  if (min == null || isNaN(min)) return "--:--";
  const sign = min < 0 ? "-" : "";
  const abs  = Math.abs(min);
  const m    = Math.floor(abs);
  const s    = Math.round((abs - m) * 60);
  return `${sign}${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
}

function getBoostWindows(mode, boostInterval = 10, boostDuration = 1) {
  if (mode !== "boost") return [];
  const w = [];
  for (let t = boostInterval; t < RACE_DURATION; t += boostInterval)
    w.push({ start: t, end: t + boostDuration });
  return w;
}

function shiftPastBoost(pitEntry, windows, lapTimeSec) {
  const warmup = (lapTimeSec / 60) * 2;
  for (const bw of windows) {
    const avoidFrom = bw.start - warmup - PIT_DURATION_MIN;
    const avoidTo   = bw.end;
    if (pitEntry > avoidFrom && pitEntry < avoidTo) pitEntry = avoidTo + 0.05;
  }
  return pitEntry;
}

function inBoostWindow(pitEntry, windows) {
  return windows.some(bw => pitEntry >= bw.start && pitEntry <= bw.end);
}

// ─── Core: build remaining stints from current race clock ────────────────────
//
// This function is the heart of the adaptive engine.
// It receives:
//   - drivers          : full driver config array
//   - mode             : "boost" | "nboost"
//   - raceClockNow     : current race clock in minutes (when next driver exits pit)
//   - driverTimeUsed   : [minutes driven per driver so far]
//   - driverStintsUsed : [number of stints per driver so far]
//   - completedCount   : how many stints are done
//   - minTotalPits     : global rule (7), already-done pits counted externally
//   - pitsDone         : how many pit stops have occurred so far
//
// It returns an array of planned stints (not yet driven).
//
function buildRemainingStints({ drivers, mode, raceClockNow, driverTimeUsed,
  driverStintsUsed, completedCount, pitsDone, kart1 = "", kart2 = "",
  boostInterval = 10, boostDuration = 1 }) {

  const bw          = getBoostWindows(mode, boostInterval, boostDuration);
  const numDrivers  = drivers.length;
  const timeLeft    = RACE_DURATION - raceClockNow;
  if (timeLeft <= 0) return [];

  // How many pit stops are still required to meet the 7-stop minimum?
  const pitsStillRequired = Math.max(0, MIN_TOTAL_PITS - pitsDone);

  // ── Step 1: figure out how many stints we need ──
  // We want to distribute time as evenly as possible, but:
  //   - Each stint is capped at MAX_STINT (20 min), planned up to MAX_STINT - PIT_BOARD_BEFORE
  //   - We must do at least pitsStillRequired more pit stops
  //   - Each driver should get at least one remaining stint if possible

  // Minimum stints = pitsStillRequired + 1 (last stint has no pit after)
  const minStints = pitsStillRequired + 1;

  // How many stints do we NEED just to fit the remaining time within MAX_STINT?
  const stintsNeededForTime = Math.ceil(timeLeft / (MAX_STINT - PIT_BOARD_BEFORE));

  // How many stints to give every driver at least one go?
  // (only drivers who have fewer stints than average get priority)
  const avgStints = (completedCount + minStints) / numDrivers;
  const driversNeedingStint = drivers.filter((_, i) => driverStintsUsed[i] < Math.ceil(avgStints)).length;

  let numStints = Math.max(minStints, stintsNeededForTime, Math.min(driversNeedingStint, numDrivers));

  // Safety: ensure we don't create stints shorter than MIN_STINT
  const drivingTime = timeLeft - (numStints - 1) * PIT_DURATION_MIN;
  if (drivingTime / numStints < MIN_STINT && numStints > minStints) {
    // Too many stints would create too-short stints, reduce
    while (numStints > minStints) {
      const dt = timeLeft - (numStints - 1) * PIT_DURATION_MIN;
      if (dt / numStints >= MIN_STINT) break;
      numStints--;
    }
  }

  // ── Step 2: assign stints to drivers ──
  // Goal: equalise total driving time across all drivers
  const overallTotalDrive = RACE_DURATION - (completedCount + numStints - 1) * PIT_DURATION_MIN;
  const fairShare = overallTotalDrive / numDrivers; // target total per driver

  // Remaining share per driver
  const remainingShare = drivers.map((_, i) => Math.max(0, fairShare - driverTimeUsed[i]));
  const totalRemShare   = remainingShare.reduce((a, b) => a + b, 0);

  // How many stints each driver gets in the remaining portion
  // Weighted by their remaining share
  let stintAlloc = drivers.map((_, i) => {
    return Math.max(0, Math.round((remainingShare[i] / (totalRemShare || 1)) * numStints));
  });

  // Fix rounding so sum = numStints
  let diff = numStints - stintAlloc.reduce((a, b) => a + b, 0);
  while (diff !== 0) {
    const dir = diff > 0 ? 1 : -1;
    // Add/remove from driver with most/least remaining share
    let pick = 0;
    for (let d = 1; d < numDrivers; d++) {
      if (dir > 0 ? remainingShare[d] > remainingShare[pick] : stintAlloc[d] > stintAlloc[pick])
        pick = d;
    }
    stintAlloc[pick] += dir;
    diff -= dir;
    if (stintAlloc[pick] < 0) stintAlloc[pick] = 0;
  }

  // Ensure every driver with remaining share > 0 gets at least 1 stint if capacity allows
  for (let d = 0; d < numDrivers; d++) {
    if (remainingShare[d] > 0 && stintAlloc[d] === 0 && numStints > 0) {
      // Steal from the driver with the most allocated stints
      const giver = stintAlloc.indexOf(Math.max(...stintAlloc));
      if (stintAlloc[giver] > 1) { stintAlloc[giver]--; stintAlloc[d]++; }
    }
  }

  // Build ordered assignment: round-robin weighted by allocation
  const assignment = [];
  const tempAlloc  = [...stintAlloc];
  for (let s = 0; s < numStints; s++) {
    // Pick driver with most remaining allocation who hasn't gone "too recently"
    let best = -1;
    for (let d = 0; d < numDrivers; d++) {
      if (tempAlloc[d] <= 0) continue;
      // Avoid same driver twice in a row unless forced
      if (assignment.length > 0 && assignment[assignment.length - 1] === d && numDrivers > 1) continue;
      if (best === -1 || tempAlloc[d] > tempAlloc[best]) best = d;
    }
    if (best === -1) {
      // Forced same driver or leftovers
      best = tempAlloc.findIndex((v, i) => v > 0);
      if (best === -1) best = s % numDrivers;
    }
    assignment.push(best);
    tempAlloc[best]--;
  }

  // ── Step 3: calculate stint durations ──
  const stintTimeTarget = drivers.map((_, i) => remainingShare[i]);
  const stintsDone      = Array(numDrivers).fill(0);
  const stintsTotal     = [...stintAlloc];
  let raceClock = raceClockNow;
  const result  = [];

  for (let s = 0; s < numStints; s++) {
    const dIdx   = assignment[s];
    const isLast = s === numStints - 1;
    const lapSec = drivers[dIdx].lapTime;

    const myStintsLeft = stintsTotal[dIdx] - stintsDone[dIdx];
    let dur = myStintsLeft > 0 ? stintTimeTarget[dIdx] / myStintsLeft : MIN_STINT;

    // Clamp: never plan beyond (MAX_STINT - 90s) so there's always room for the pit-board lap + buffer
    dur = Math.max(MIN_STINT, Math.min(MAX_STINT - PIT_BOARD_BEFORE, dur));

    let pitEntry = isLast ? null : raceClock + dur;

    // Boost avoidance
    if (!isLast && bw.length && pitEntry != null) {
      const shifted = shiftPastBoost(pitEntry, bw, lapSec);
      if (shifted !== pitEntry) {
        dur      = Math.min(MAX_STINT - PIT_BOARD_BEFORE, Math.max(MIN_STINT, shifted - raceClock));
        pitEntry = raceClock + dur;
      }
    }

    // Last stint: use all remaining time (up to MAX_STINT)
    if (isLast) {
      dur      = Math.min(MAX_STINT, RACE_DURATION - raceClock);
      pitEntry = null;
    }

    // Guard: don't let any stint push us past race end
    if (raceClock + dur + (isLast ? 0 : PIT_DURATION_MIN) > RACE_DURATION + 0.01) {
      dur = Math.max(MIN_STINT, RACE_DURATION - raceClock - (isLast ? 0 : PIT_DURATION_MIN));
      pitEntry = isLast ? null : raceClock + dur;
    }

    const pitExit    = pitEntry != null ? pitEntry + PIT_DURATION_MIN : null;
    // Pit board = 90 seconds before the planned end of this stint
    const pitBoardAt = pitEntry != null ? parseFloat((raceClock + dur - PIT_BOARD_BEFORE).toFixed(3)) : null;

    const stintNumber = completedCount + s + 1;
    const kartNum     = stintNumber % 2 === 1 ? kart1 : kart2; // odd=kart1, even=kart2

    result.push({
      stint:          stintNumber,
      kartNum,
      driver:         dIdx,
      driverName:     drivers[dIdx].name,
      startTime:      parseFloat(raceClock.toFixed(3)),
      duration:       parseFloat(dur.toFixed(3)),
      endTime:        parseFloat((raceClock + dur).toFixed(3)),
      pitEntry:       pitEntry    != null ? parseFloat(pitEntry.toFixed(3))    : null,
      pitExit:        pitExit     != null ? parseFloat(pitExit.toFixed(3))     : null,
      pitBoardAt:     pitBoardAt  != null ? parseFloat(pitBoardAt.toFixed(3))  : null,
      estimatedLaps:  Math.floor((dur * 60) / lapSec),
      inBoostConflict: pitEntry != null && inBoostWindow(pitEntry, bw),
      isCompleted:    false,
      isPlanned:      true,
    });

    stintTimeTarget[dIdx] -= dur;
    stintsDone[dIdx]++;
    raceClock = pitExit != null ? pitExit : raceClock + dur;
  }

  return result;
}

// ─── Recompute full schedule after recording actual pit exit ──────────────────) {
  const pitsDone = completedStints.length; // each completed stint ended with a pit (except possibly last)

  const driverTimeUsed   = Array(drivers.length).fill(0);
  const driverStintsUsed = Array(drivers.length).fill(0);
  completedStints.forEach(c => {
    driverTimeUsed[c.driver]   += c.duration;
    driverStintsUsed[c.driver] += 1;
  });

  const remaining = buildRemainingStints({
    drivers, mode,
    raceClockNow:     actualExitMin,
    driverTimeUsed,
    driverStintsUsed,
    completedCount:   completedStints.length,
    pitsDone,
  });

  return [...completedStints, ...remaining];
}

// ─── App ──────────────────────────────────────────────────────────────────────
// ─── A11y: Global CSS styles injected via JSX style tag ─────────────────────

// ── UI ───────────────────────────────────────────────────────────────────────
const KV_API = "https://gokart-api.allansinmail.workers.dev";

function App() {
  const [page, setPage] = useState("setup");
  const [numDrivers, setNumDrivers] = useState(3);
  const [mode, setMode] = useState("boost");
  const [boostInterval, setBoostInterval] = useState(10);
  const [boostDuration, setBoostDuration] = useState(1);
  const [kart1, setKart1] = useState("");
  const [kart2, setKart2] = useState("");
  const [drivers, setDrivers] = useState([
    { name: "Fører 1", lapTime: 55, lapTimeStr: "55,0" },
    { name: "Fører 2", lapTime: 57, lapTimeStr: "57,0" },
    { name: "Fører 3", lapTime: 60, lapTimeStr: "60,0" },
  ]);
  const [schedule, setSchedule] = useState([]);
  const [completed, setCompleted] = useState([]);
  const [actualLaps, setActualLaps] = useState({});
  const [raceStarted, setRaceStarted] = useState(false);
  const [raceStartTime, setRaceStartTime] = useState(null);
  const [now, setNow] = useState(Date.now());
  const [activeTab, setActiveTab] = useState("live");
  const [manualTime, setManualTime] = useState("");
  const [adjustLog, setAdjustLog] = useState([]);
  const [kvKey, setKvKey] = useState("mitt-lag-2025");
  const [kvStatus, setKvStatus] = useState("");

  useEffect(() => {
    if (!raceStarted) return;
    const id = setInterval(() => setNow(Date.now()), 1000);
    return () => clearInterval(id);
  }, [raceStarted]);

  const raceElapsed = raceStarted ? (now - raceStartTime) / 60000 : 0;

  const handleNumDrivers = (n) => {
    setNumDrivers(n);
    setDrivers(prev => {
      const next = [...prev];
      while (next.length < n) next.push({ name: "Fører " + (next.length+1), lapTime: 58, lapTimeStr: "58,0" });
      return next.slice(0, n);
    });
  };

  const parseLapTime = (str) => {
    if (!str && str !== 0) return null;
    const val = parseFloat(String(str).replace(",", "."));
    return isNaN(val) ? null : Math.max(10, Math.min(180, val));
  };

  const fmtLapTime = (sec) => {
    if (sec == null) return "";
    return String(Math.round(sec * 10) / 10).replace(".", ",");
  };

  const buildInitial = () => {
    const sched = buildRemainingStints({
      drivers, mode, kart1, kart2, boostInterval, boostDuration,
      raceClockNow: 0,
      driverTimeUsed: Array(drivers.length).fill(0),
      driverStintsUsed: Array(drivers.length).fill(0),
      completedCount: 0, pitsDone: 0,
    });
    setSchedule(sched);
    setCompleted([]);
    setAdjustLog([]);
    setActualLaps({});
    setRaceStarted(false);
    setRaceStartTime(null);
    setPage("race");
    setActiveTab("live");
  };

  const recordPitExit = (actualExitMin) => {
    const currentStint = schedule[completed.length];
    if (!currentStint) return;
    const currentStart = currentStint.actualStart != null ? currentStint.actualStart : currentStint.startTime;
    const actualPitEntry = actualExitMin - PIT_DURATION_MIN;
    const actualDuration = Math.max(0, actualPitEntry - currentStart);
    const done = { ...currentStint, isCompleted: true, actualStart: currentStart,
      actualEnd: actualPitEntry, actualDuration: parseFloat(actualDuration.toFixed(3)) };
    const newCompleted = [...completed, done];
    const dtu = Array(drivers.length).fill(0);
    const dsu = Array(drivers.length).fill(0);
    newCompleted.forEach(c => { dtu[c.driver] += c.actualDuration || c.duration; dsu[c.driver]++; });
    const remaining = buildRemainingStints({
      drivers, mode, kart1, kart2, boostInterval, boostDuration,
      raceClockNow: actualExitMin, driverTimeUsed: dtu, driverStintsUsed: dsu,
      completedCount: newCompleted.length, pitsDone: newCompleted.length,
    });
    const planned = currentStint.pitEntry;
    const delta = planned != null ? actualPitEntry - planned : null;
    setAdjustLog(prev => [...prev, {
      stint: currentStint.stint, driver: currentStint.driverName,
      planned, actual: actualPitEntry, delta, timestamp: fmt(raceElapsed),
    }]);
    setCompleted(newCompleted);
    setSchedule([...newCompleted, ...remaining]);
    setManualTime("");
  };

  const parseManualTime = (str) => {
    if (!str || !str.trim()) return null;
    const parts = str.split(":");
    if (parts.length === 2) return (parseInt(parts[0])||0) + (parseInt(parts[1])||0)/60;
    return parseFloat(str) || null;
  };

  const kvSave = async () => {
    setKvStatus("saving");
    try {
      const data = { drivers, mode, boostInterval, boostDuration, kart1, kart2,
        schedule, completed, actualLaps, adjustLog, raceStarted, raceStartTime };
      await fetch(KV_API + "/?key=" + encodeURIComponent(kvKey), {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data),
      });
      setKvStatus("saved");
      setTimeout(() => setKvStatus(""), 3000);
    } catch(e) { setKvStatus("error"); setTimeout(() => setKvStatus(""), 4000); }
  };

  const kvLoad = async () => {
    setKvStatus("loading");
    try {
      const res = await fetch(KV_API + "/?key=" + encodeURIComponent(kvKey));
      if (res.status === 404) { setKvStatus("notfound"); setTimeout(()=>setKvStatus(""),3000); return; }
      const data = await res.json();
      if (data.drivers)    setDrivers(data.drivers);
      if (data.mode)       setMode(data.mode);
      if (data.kart1 != null) setKart1(data.kart1);
      if (data.kart2 != null) setKart2(data.kart2);
      if (data.schedule)   { setSchedule(data.schedule); setPage("race"); }
      if (data.completed)  setCompleted(data.completed);
      if (data.actualLaps) setActualLaps(data.actualLaps);
      if (data.adjustLog)  setAdjustLog(data.adjustLog);
      if (data.raceStarted != null) setRaceStarted(data.raceStarted);
      if (data.raceStartTime)       setRaceStartTime(data.raceStartTime);
      setKvStatus("loaded");
      setTimeout(() => setKvStatus(""), 3000);
    } catch(e) { setKvStatus("error"); setTimeout(() => setKvStatus(""), 4000); }
  };

  const currentIdx   = completed.length;
  const currentStint = schedule[currentIdx];
  const nextStint    = schedule[currentIdx + 1];
  const pitsDone     = completed.length;
  const currentStart = currentStint ? (currentStint.actualStart != null ? currentStint.actualStart : currentStint.startTime) : null;
  const timeInStint  = raceStarted && currentStart != null ? raceElapsed - currentStart : 0;
  const pitBoardAt   = currentStint ? currentStint.pitBoardAt : null;
  const showPitBoard = raceStarted && currentStint && pitBoardAt != null && raceElapsed >= pitBoardAt;
  const pitBoardUrgent = showPitBoard && currentStint &&
    raceElapsed >= pitBoardAt + (drivers[currentStint.driver] ? drivers[currentStint.driver].lapTime / 60 : 1);

  const totalPitsPlanned = schedule.length - 1;
  const bw = getBoostWindows(mode, boostInterval, boostDuration);

  // Styles
  const T = { fontFamily: "'Courier New', monospace" };
  const card = { background:"#0d0d14", borderRadius:8, padding:14, border:"1px solid #1a1a2e", marginBottom:14 };
  const cardTitle = { fontSize:11, letterSpacing:3, color:"#FF6B6B", marginBottom:12, fontWeight:900 };
  const btn = (bg, fg) => ({ background:bg, border:"none", color:fg, padding:"10px 16px",
    borderRadius:6, cursor:"pointer", fontWeight:900, fontFamily:"'Courier New',monospace", fontSize:12 });
  const inp = { background:"#111", border:"1px solid #2a2a3a", color:"#F4F4F8",
    padding:"8px 10px", borderRadius:4, fontSize:13, fontFamily:"'Courier New',monospace" };

  // ── SETUP PAGE ──────────────────────────────────────────────────────────────
  if (page === "setup") return html2`
    <div style=${{ minHeight:"100vh", background:"#0a0a0f", color:"#F4F4F8", ...T }}>
      <div style=${{ background:"linear-gradient(135deg,#1a0a2e,#0d1117)", borderBottom:"2px solid #FF6B6B", padding:"14px 22px", display:"flex", alignItems:"center", gap:14 }}>
        <span style=${{ fontSize:26 }}>🏁</span>
        <div>
          <div style=${{ fontSize:17, fontWeight:900, letterSpacing:4 }}>GOKART STRATEGI</div>
          <div style=${{ fontSize:10, letterSpacing:3, color:"#FF6B6B" }}>BEDRIFTSSERIEN</div>
        </div>
      </div>

      <div style=${{ maxWidth:680, margin:"0 auto", padding:"20px 16px" }}>

        <div style=${card}>
          <div style=${cardTitle}>LØPSMODUS</div>
          <div style=${{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8 }}>
            ${[["speed4","🏎 Speed 4","Uten boost"],["boost","⚡ Speed 4 + Boost","Med boost"],["nboost","🏁 Speed 5","Uten boost"]].map(([v,l,s]) =>
              html2`<button key=${v} onClick=${()=>setMode(v)} style=${{
                background: mode===v ? "#FF6B6B" : "#111",
                border: "2px solid " + (mode===v ? "#FF6B6B" : "#2a2a3a"),
                color: mode===v ? "#000" : "#F4F4F8",
                borderRadius:6, padding:"10px 6px", cursor:"pointer", textAlign:"center",
                fontFamily:"'Courier New',monospace",
              }}>
                <div style=${{ fontSize:12, fontWeight:700 }}>${l}</div>
                <div style=${{ fontSize:10, color: mode===v ? "#1a0000" : "#9A9AA8", marginTop:3 }}>${s}</div>
              </button>`
            )}
          </div>
          ${mode === "boost" && html2`<div style=${{ marginTop:12, background:"#0a0a0f", borderRadius:6, padding:12, border:"1px solid #2a2a3a" }}>
            <div style=${{ fontSize:10, color:"#FFE066", letterSpacing:2, marginBottom:10 }}>⚡ BOOST-KONFIGURASJON</div>
            <div style=${{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
              <div>
                <label style=${{ display:"block", fontSize:11, color:"#B8B8C4", marginBottom:5 }}>Boost hvert X minutt</label>
                <input type="number" min="5" max="30" value=${boostInterval}
                  onChange=${e => setBoostInterval(parseInt(e.target.value)||10)}
                  style=${{ ...inp, width:70, fontSize:18, fontWeight:900, color:"#FFE066", textAlign:"center" }} />
                <div style=${{ fontSize:11, color:"#9A9AA8", marginTop:4 }}>${Math.floor(119/boostInterval)} boosts i løpet</div>
              </div>
              <div>
                <label style=${{ display:"block", fontSize:11, color:"#B8B8C4", marginBottom:5 }}>Boost varer (sekunder)</label>
                <input type="number" min="15" max="180" step="5" value=${Math.round(boostDuration*60)}
                  onChange=${e => setBoostDuration((parseInt(e.target.value)||60)/60)}
                  style=${{ ...inp, width:70, fontSize:18, fontWeight:900, color:"#FFE066", textAlign:"center" }} />
                <div style=${{ fontSize:11, color:"#9A9AA8", marginTop:4 }}>${Math.round(boostDuration*60)} sek</div>
              </div>
            </div>
          </div>`}
        </div>

        <div style=${card}>
          <div style=${cardTitle}>ANTALL FØRERE</div>
          <div style=${{ display:"flex", gap:8 }}>
            ${[3,4,5,6,7,8].map(n => html2`
              <button key=${n} onClick=${()=>handleNumDrivers(n)} style=${{
                width:44, height:44, background: numDrivers===n?"#FF6B6B":"#111",
                border:"2px solid "+(numDrivers===n?"#FF6B6B":"#2a2a3a"),
                color: numDrivers===n?"#000":"#F4F4F8",
                borderRadius:6, cursor:"pointer", fontWeight:900, fontSize:14, fontFamily:"'Courier New',monospace",
              }}>${n}</button>`
            )}
          </div>
        </div>

        <div style=${card}>
          <div style=${cardTitle}>KARTNUMMER</div>
          <div style=${{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
            ${[["Kart A (odde stint)", kart1, setKart1],["Kart B (partall stint)", kart2, setKart2]].map(([label,val,set]) =>
              html2`<div style=${{ background:"#111", borderRadius:6, padding:12, border:"1px solid #2a2a3a" }}>
                <div style=${{ fontSize:11, color:"#FF6B6B", marginBottom:8, fontWeight:700 }}>${label}</div>
                <input type="number" min="1" max="99" value=${val} placeholder="–"
                  onChange=${e => { const v=e.target.value; if(v===""||parseInt(v)>=1) set(v); }}
                  style=${{ ...inp, width:"100%", fontSize:22, fontWeight:900, color:"#FFE066", textAlign:"center" }} />
              </div>`
            )}
          </div>
        </div>

        <div style=${card}>
          <div style=${cardTitle}>FØRER-OPPSETT</div>
          ${drivers.map((d,i) => html2`
            <div key=${i} style=${{ marginBottom:12 }}>
              <div style=${{ display:"flex", alignItems:"center", gap:8, marginBottom:6 }}>
                <div style=${{ width:10, height:10, borderRadius:"50%", background:COLORS[i], flexShrink:0 }}></div>
                <input value=${d.name} onChange=${e=>setDrivers(prev=>prev.map((x,j)=>j===i?{...x,name:e.target.value}:x))}
                  style=${{ ...inp, flex:1 }} />
              </div>
              <div style=${{ display:"flex", alignItems:"center", gap:8, paddingLeft:18 }}>
                <span style=${{ fontSize:11, color:"#9A9AA8", minWidth:90 }}>Rundetid (sek)</span>
                <input type="text" inputmode="decimal" placeholder="36,1"
                  value=${d.lapTimeStr != null ? d.lapTimeStr : fmtLapTime(d.lapTime)}
                  onChange=${e => {
                    const raw = e.target.value;
                    const parsed = parseLapTime(raw);
                    setDrivers(prev => prev.map((x,j) => j===i ? {...x, lapTimeStr:raw, ...(parsed?{lapTime:parsed}:{})} : x));
                  }}
                  onBlur=${e => {
                    const parsed = parseLapTime(e.target.value);
                    if (parsed) setDrivers(prev => prev.map((x,j) => j===i ? {...x, lapTimeStr:fmtLapTime(parsed), lapTime:parsed} : x));
                  }}
                  style=${{ ...inp, width:80, color:"#FFE066", fontWeight:700, textAlign:"center" }} />
                <span style=${{ fontSize:11, color:"#9A9AA8" }}>${(d.lapTime/60).toFixed(3)} min</span>
              </div>
            </div>`
          )}
        </div>

        <div style=${card}>
          <div style=${cardTitle}>☁ SKY-SYNKRONISERING</div>
          <div style=${{ fontSize:11, color:"#9A9AA8", marginBottom:10 }}>Samme sesjonsnøkkel på alle enheter deler data.</div>
          <div style=${{ display:"flex", gap:8, flexWrap:"wrap", alignItems:"center" }}>
            <input value=${kvKey} onChange=${e=>setKvKey(e.target.value)} placeholder="sesjonsnøkkel"
              style=${{ ...inp, width:180 }} />
            <button onClick=${kvSave} style=${btn("#69DB7C","#000")}>↑ LAGRE</button>
            <button onClick=${kvLoad} style=${btn("#4DABF7","#000")}>↓ HENT</button>
          </div>
          ${kvStatus && html2`<div style=${{ marginTop:8, fontSize:11, color: kvStatus==="saved"||kvStatus==="loaded"?"#69DB7C":kvStatus==="error"?"#FF6B6B":"#FFE066" }}>
            ${kvStatus==="saving"?"⏳ Lagrer...":kvStatus==="loading"?"⏳ Henter...":kvStatus==="saved"?"✓ Lagret!":kvStatus==="loaded"?"✓ Hentet!":kvStatus==="error"?"✗ Feil — sjekk Worker-URL":kvStatus==="notfound"?"✗ Ingen data med denne nøkkelen":""}
          </div>`}
        </div>

        <button onClick=${buildInitial} style=${{
          background:"linear-gradient(135deg,#FF6B6B,#cc2a21)", border:"none",
          color:"#fff", padding:"16px 20px", borderRadius:8, cursor:"pointer",
          width:"100%", fontFamily:"'Courier New',monospace", fontSize:14,
          fontWeight:900, letterSpacing:3, textTransform:"uppercase",
        }}>⚡ BEREGN STRATEGI</button>
      </div>
    </div>`;

  // ── RACE PAGE ───────────────────────────────────────────────────────────────
  return html2`
    <div style=${{ minHeight:"100vh", background:"#0a0a0f", color:"#F4F4F8", ...T }}>

      ${showPitBoard && html2`<div style=${{ background: pitBoardUrgent?"#c0392b":"#a05400", padding:"12px 24px", textAlign:"center", fontSize:14, fontWeight:900, color:"#fff" }}>
        🪧 PIT-SKILT UT! — ${currentStint.driverName.toUpperCase()} — KJØR ÉN RUNDE TIL, SÅ PIT!
        ${pitBoardUrgent && " ⚠️ BUFFER-RUNDE — PIT NESTE INNGANG!"}
      </div>`}

      <div style=${{ background:"linear-gradient(135deg,#1a0a2e,#0d1117)", borderBottom:"2px solid #FF6B6B", padding:"14px 22px", display:"flex", alignItems:"center", gap:14 }}>
        <span style=${{ fontSize:26 }}>🏁</span>
        <div style=${{ fontSize:15, fontWeight:900, letterSpacing:3 }}>GOKART STRATEGI</div>
        <div style=${{ marginLeft:"auto", display:"flex", gap:8, alignItems:"center" }}>
          ${!raceStarted
            ? html2`<button onClick=${()=>{setRaceStarted(true);setRaceStartTime(Date.now());}} style=${btn("#69DB7C","#000")}>▶ START LØP</button>`
            : html2`<span style=${{ fontSize:11, color:"#69DB7C", letterSpacing:2 }}>● LØPET PÅGÅR</span>`
          }
          <button onClick=${()=>setPage("setup")} style=${btn("#111","#F4F4F8")}>← OPPSETT</button>
        </div>
      </div>

      <div style=${{ background:"#0d0d14", borderBottom:"1px solid #1a1a2e", padding:"10px 20px", display:"flex", gap:24, flexWrap:"wrap", alignItems:"center" }}>
        <div><div style=${{ fontSize:10, color:"#9A9AA8", letterSpacing:2 }}>LØPSTID</div><div style=${{ fontSize:26, fontWeight:900, color: raceElapsed>110?"#FF6B6B":"#FFE066" }}>${fmt(raceElapsed)}</div></div>
        <div><div style=${{ fontSize:10, color:"#9A9AA8", letterSpacing:2 }}>GJENSTÅR</div><div style=${{ fontSize:26, fontWeight:900, color:"#69DB7C" }}>${fmt(Math.max(0,120-raceElapsed))}</div></div>
        ${currentStint && html2`<div><div style=${{ fontSize:10, color:"#9A9AA8", letterSpacing:2 }}>TID I STINT</div><div style=${{ fontSize:26, fontWeight:900, color: showPitBoard?"#FF6B6B":timeInStint>=15?"#FFA94D":"#F4F4F8" }}>${fmt(timeInStint)}</div></div>`}
        <div style=${{ fontSize:11, color:"#9A9AA8" }}>Pit: <b style=${{ color: pitsDone<7?"#FFA94D":"#69DB7C" }}>${pitsDone}</b>/7 min</div>
        <div style=${{ marginLeft:"auto", display:"flex", gap:6, alignItems:"center" }}>
          <input value=${kvKey} onChange=${e=>setKvKey(e.target.value)} style=${{ ...inp, width:140, fontSize:11 }} />
          <button onClick=${kvSave} style=${btn("#69DB7C","#000")}>↑</button>
          <button onClick=${kvLoad} style=${btn("#4DABF7","#000")}>↓</button>
        </div>
      </div>

      <div style=${{ maxWidth:1300, margin:"0 auto", padding:14 }}>
        <div style=${{ display:"flex", gap:4, borderBottom:"2px solid #1a1a2e", marginBottom:14, overflowX:"auto" }}>
          ${[["live","🔴 LIVE"],["strategy","📋 STRATEGI"],["log","📝 LOGG"]].map(([id,label]) =>
            html2`<button key=${id} onClick=${()=>setActiveTab(id)} style=${{
              background: activeTab===id?"#1a1a2e":"transparent", border:"none",
              borderBottom:"2px solid "+(activeTab===id?"#FF6B6B":"transparent"),
              color: activeTab===id?"#fff":"#B8B8C4", padding:"10px 14px", cursor:"pointer",
              fontSize:11, letterSpacing:2, fontFamily:"'Courier New',monospace", fontWeight:700, marginBottom:-2,
            }}>${label}</button>`
          )}
        </div>

        ${activeTab === "live" && html2`<div style=${{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:14 }}>

          <div style=${{ background:"#111", borderRadius:8, padding:18, border:"2px solid "+(currentStint?COLORS[currentStint.driver]:"#1a1a2e") }}>
            <div style=${{ fontSize:10, letterSpacing:3, color:"#FF6B6B", marginBottom:10 }}>NÅVÆRENDE STINT #${currentIdx+1}</div>
            ${currentStint ? html2`
              <div style=${{ display:"flex", alignItems:"center", gap:10, marginBottom:14 }}>
                <div style=${{ width:14, height:14, borderRadius:"50%", background:COLORS[currentStint.driver] }}></div>
                <span style=${{ fontSize:18, fontWeight:900 }}>${currentStint.driverName}</span>
                ${currentStint.kartNum && html2`<span style=${{ marginLeft:"auto", background:"#1a0a2e", border:"1px solid #DA77F2", color:"#DA77F2", borderRadius:6, padding:"3px 12px", fontSize:16, fontWeight:900 }}>🏎 #${currentStint.kartNum}</span>`}
              </div>
              <div style=${{ display:"flex", justifyContent:"space-between", marginBottom:6 }}><span style=${{ color:"#9A9AA8", fontSize:11 }}>Planlagt varighet</span><span style=${{ color:"#FFE066", fontWeight:700 }}>${fmt(currentStint.duration)}</span></div>
              <div style=${{ display:"flex", justifyContent:"space-between", marginBottom:6 }}><span style=${{ color:"#9A9AA8", fontSize:11 }}>🪧 Pit-skilt ved</span><span style=${{ color:"#FFA94D", fontWeight:700 }}>${fmt(currentStint.pitBoardAt)}</span></div>
              <div style=${{ display:"flex", justifyContent:"space-between", marginBottom:6 }}><span style=${{ color:"#9A9AA8", fontSize:11 }}>Planlagt pit inn</span><span style=${{ color:"#FF6B6B", fontWeight:700 }}>${currentStint.pitEntry ? fmt(currentStint.pitEntry) : "Siste"}</span></div>
              <div style=${{ display:"flex", justifyContent:"space-between", marginBottom:14 }}><span style=${{ color:"#9A9AA8", fontSize:11 }}>Est. runder</span><span style=${{ color:"#4DABF7", fontWeight:700 }}>${currentStint.estimatedLaps}</span></div>

              ${raceStarted && html2`<div style=${{ marginTop:10, padding:12, background:"#0d0d14", borderRadius:6, border:"1px solid #2a2a3a" }}>
                <div style=${{ fontSize:10, color:"#FFA94D", letterSpacing:2, marginBottom:8 }}>📝 REGISTRER NÅR NESTE FØRER ER UTE</div>
                <div style=${{ display:"flex", gap:8, flexWrap:"wrap" }}>
                  <input placeholder=${fmt(raceElapsed)} value=${manualTime} onChange=${e=>setManualTime(e.target.value)}
                    style=${{ ...inp, width:80 }} />
                  <button onClick=${()=>recordPitExit(parseManualTime(manualTime)||raceElapsed)} style=${btn("#69DB7C","#000")}>✓ FØRER UTE</button>
                  <button onClick=${()=>recordPitExit(raceElapsed)} style=${btn("#4DABF7","#000")}>⏱ NÅ (${fmt(raceElapsed)})</button>
                </div>
              </div>`}
            ` : html2`<div style=${{ color:"#9A9AA8", textAlign:"center", padding:20 }}>Løpet er fullført! 🏁</div>`}
          </div>

          <div style=${{ background:"#111", borderRadius:8, padding:18, border:"1px solid "+(nextStint?COLORS[nextStint.driver]+"55":"#1a1a2e") }}>
            <div style=${{ fontSize:10, letterSpacing:3, color:"#9A9AA8", marginBottom:10 }}>NESTE STINT #${currentIdx+2}</div>
            ${nextStint ? html2`
              <div style=${{ display:"flex", alignItems:"center", gap:10, marginBottom:14 }}>
                <div style=${{ width:12, height:12, borderRadius:"50%", background:COLORS[nextStint.driver] }}></div>
                <span style=${{ fontSize:16, fontWeight:700, color:"#B8B8C4" }}>${nextStint.driverName}</span>
                ${nextStint.kartNum && html2`<span style=${{ marginLeft:"auto", background:"#0a2a1a", border:"1px solid #69DB7C", color:"#69DB7C", borderRadius:12, padding:"3px 10px", fontSize:14, fontWeight:900 }}>🏎 #${nextStint.kartNum}</span>`}
              </div>
              <div style=${{ display:"flex", justifyContent:"space-between", marginBottom:6 }}><span style=${{ color:"#9A9AA8", fontSize:11 }}>Planlagt start</span><span style=${{ fontWeight:700 }}>${fmt(nextStint.startTime)}</span></div>
              <div style=${{ display:"flex", justifyContent:"space-between", marginBottom:6 }}><span style=${{ color:"#9A9AA8", fontSize:11 }}>Planlagt varighet</span><span style=${{ color:"#FFE066", fontWeight:700 }}>${fmt(nextStint.duration)}</span></div>
              <div style=${{ display:"flex", justifyContent:"space-between", marginBottom:6 }}><span style=${{ color:"#9A9AA8", fontSize:11 }}>🪧 Pit-skilt ved</span><span style=${{ color:"#FFA94D", fontWeight:700 }}>${fmt(nextStint.pitBoardAt)}</span></div>
              <div style=${{ display:"flex", justifyContent:"space-between" }}><span style=${{ color:"#9A9AA8", fontSize:11 }}>Est. runder</span><span style=${{ color:"#4DABF7", fontWeight:700 }}>${nextStint.estimatedLaps}</span></div>
            ` : html2`<div style=${{ color:"#9A9AA8", fontSize:13 }}>Siste stint pågår</div>`}
          </div>

          ${mode==="boost" && raceStarted && html2`<div style=${{ gridColumn:"1/-1", background:"#111", borderRadius:8, padding:12, border:"1px solid #1a1a2e", display:"flex", gap:10, flexWrap:"wrap", alignItems:"center" }}>
            <span style=${{ fontSize:10, letterSpacing:3, color:"#FFE066" }}>⚡ NESTE BOOST</span>
            ${bw.filter(b=>b.end>raceElapsed).slice(0,6).map((b,i) => {
              const active = b.start<=raceElapsed && b.end>raceElapsed;
              return html2`<div key=${i} style=${{ background:active?"#3a2a00":"#0a0a0f", border:"1px solid "+(active?"#FFE066":"#1a1a2e"), borderRadius:6, padding:"6px 12px", textAlign:"center", minWidth:60 }}>
                ${active ? html2`<div style=${{ fontSize:12, fontWeight:900, color:"#FFE066" }}>🔥 AKTIV!</div>`
                  : html2`<div><div style=${{ fontSize:13, fontWeight:900, color:"#FFE066" }}>${fmt(b.start)}</div><div style=${{ fontSize:10, color:"#9A9AA8" }}>om ${fmt(b.start-raceElapsed)}</div></div>`}
              </div>`;
            })}
          </div>`}
        </div>`}

        ${activeTab === "strategy" && html2`<div>
          <div style=${{ overflowX:"auto", background:"#111", borderRadius:8, border:"1px solid #1a1a2e" }}>
            <table style=${{ width:"100%", borderCollapse:"collapse", fontSize:12 }}>
              <thead><tr style=${{ background:"#1a1a2e", borderBottom:"2px solid #FF6B6B" }}>
                ${["#","KART","FØRER","START","VARIGHET","🪧 SKILT","PIT INN","PIT UT","RND","STATUS"].map(h =>
                  html2`<th style=${{ padding:"9px 8px", textAlign:"left", color:"#FF6B6B", fontWeight:900, fontSize:10, whiteSpace:"nowrap" }}>${h}</th>`
                )}
              </tr></thead>
              <tbody>
                ${schedule.map((s,i) => {
                  const isCurrent = i===currentIdx && raceStarted;
                  const isDone = s.isCompleted;
                  return html2`<tr key=${i} style=${{ borderBottom:"1px solid #1a1a2e", background: isCurrent?"#2a1a00":isDone?"#0a200a":i%2===0?"#0d0d14":"#111", opacity:isDone?0.7:1 }}>
                    <td style=${{ padding:"8px", fontWeight:700, color:isCurrent?"#FFE066":"#FF6B6B" }}>${isCurrent?"▶":isDone?"✓":""} ${s.stint}</td>
                    <td style=${{ padding:"8px" }}>${s.kartNum ? html2`<span style=${{ background:s.stint%2===1?"#2a0a4e":"#0a2a1a", border:"1px solid "+(s.stint%2===1?"#DA77F2":"#69DB7C"), color:s.stint%2===1?"#DA77F2":"#69DB7C", borderRadius:4, padding:"1px 7px", fontSize:11, fontWeight:900 }}>${s.stint%2===1?"A":"B"}·${s.kartNum}</span>` : "—"}</td>
                    <td style=${{ padding:"8px" }}>
                      <span style=${{ display:"flex", alignItems:"center", gap:5 }}>
                        <span style=${{ width:8, height:8, borderRadius:"50%", background:COLORS[s.driver], display:"inline-block" }}></span>
                        ${s.driverName}
                      </span>
                    </td>
                    <td style=${{ padding:"8px", color:"#B8B8C4", whiteSpace:"nowrap" }}>${fmt(s.startTime)}</td>
                    <td style=${{ padding:"8px", color:"#FFE066", fontWeight:700, whiteSpace:"nowrap" }}>${fmt(s.duration)}</td>
                    <td style=${{ padding:"8px", color:"#FFA94D", whiteSpace:"nowrap" }}>${s.pitBoardAt ? fmt(s.pitBoardAt) : "—"}</td>
                    <td style=${{ padding:"8px", color:s.pitEntry?"#FF6B6B":"#555", whiteSpace:"nowrap" }}>${s.pitEntry ? fmt(s.pitEntry) : "—"}</td>
                    <td style=${{ padding:"8px", color:s.pitExit?"#69DB7C":"#555", whiteSpace:"nowrap" }}>${s.pitExit ? fmt(s.pitExit) : "—"}</td>
                    <td style=${{ padding:"8px", color:"#4DABF7", fontWeight:700 }}>${s.estimatedLaps}</td>
                    <td style=${{ padding:"8px", fontSize:10, whiteSpace:"nowrap" }}>
                      ${isDone ? html2`<span style=${{ color:"#69DB7C" }}>✓ FERDIG</span>`
                        : isCurrent ? html2`<span style=${{ color:"#FFE066" }}>▶ PÅGÅR</span>`
                        : s.inBoostConflict ? html2`<span style=${{ color:"#FF6B6B" }}>⚡ BOOST</span>`
                        : html2`<span style=${{ color:"#7A7A88" }}>VENTER</span>`}
                    </td>
                  </tr>`;
                })}
              </tbody>
            </table>
          </div>
          <div style=${{ marginTop:8, fontSize:11, color:"#9A9AA8" }}>
            Pitstop: <b style=${{ color: totalPitsPlanned<7?"#FF6B6B":"#FFA94D" }}>${totalPitsPlanned}</b>
            ${totalPitsPlanned<7 && html2`<span style=${{ color:"#FF6B6B" }}> ⚠️ Under minimum!</span>`}
            ${" · Gjennomført: "}<b style=${{ color:"#69DB7C" }}>${pitsDone}</b>
          </div>
        </div>`}

        ${activeTab === "log" && html2`<div>
          ${adjustLog.length === 0
            ? html2`<div style=${{ background:"#111", borderRadius:8, padding:32, textAlign:"center", color:"#555", border:"1px solid #1a1a2e" }}>
                <div style=${{ fontSize:32, marginBottom:8 }}>📝</div>
                <div>Ingen justeringer registrert ennå</div>
              </div>`
            : adjustLog.map((e,i) => {
                const early = e.delta!=null && e.delta<-0.5;
                const late  = e.delta!=null && e.delta>0.5;
                return html2`<div key=${i} style=${{ background:"#111", borderRadius:8, padding:14, marginBottom:10, border:"1px solid "+(early?"#69DB7C":late?"#FFA94D":"#1a1a2e"), borderLeft:"4px solid "+(early?"#69DB7C":late?"#FFA94D":"#555") }}>
                  <div style=${{ display:"flex", gap:12, marginBottom:8, fontSize:11 }}>
                    <span style=${{ color:"#FF6B6B", fontWeight:900 }}>STINT #${e.stint}</span>
                    <span style=${{ fontWeight:700 }}>${e.driver}</span>
                    <span style=${{ marginLeft:"auto", color:"#9A9AA8" }}>@ ${e.timestamp}</span>
                  </div>
                  <div style=${{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8 }}>
                    ${[["PLANLAGT",fmt(e.planned),"#B8B8C4"],["FAKTISK",fmt(e.actual),"#F4F4F8"],["AVVIK",e.delta!=null?(early?"-":late?"+":" ")+fmt(Math.abs(e.delta)):"—",early?"#69DB7C":late?"#FFA94D":"#F4F4F8"]].map(([l,v,c]) =>
                      html2`<div style=${{ background:"#0d0d14", borderRadius:6, padding:"8px", textAlign:"center" }}>
                        <div style=${{ fontSize:9, color:"#9A9AA8", letterSpacing:2, marginBottom:4 }}>${l}</div>
                        <div style=${{ fontSize:14, fontWeight:700, color:c }}>${v}</div>
                      </div>`
                    )}
                  </div>
                </div>`;
              })
          }
        </div>`}
      </div>
    </div>`;
}

const root = createRoot(document.getElementById("root"));
root.render(h(App, null));
</script>
</body>
</html>
