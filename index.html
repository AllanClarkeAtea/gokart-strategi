<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CDN Test</title>
  <style>
    body { background: #0a0a0f; color: #F4F4F8; font-family: monospace; padding: 30px; }
    .ok  { color: #69DB7C; }
    .err { color: #FF6B6B; }
    li { margin: 10px 0; font-size: 16px; }
  </style>
</head>
<body>
  <h2>CDN-lastettest</h2>
  <ul id="log"></ul>

  <script>
    function log(msg, ok) {
      var li = document.createElement('li');
      li.className = ok ? 'ok' : 'err';
      li.textContent = (ok ? '✅ ' : '❌ ') + msg;
      document.getElementById('log').appendChild(li);
    }

    // Test 1: React
    var s1 = document.createElement('script');
    s1.crossOrigin = 'anonymous';
    s1.src = 'https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js';
    s1.onload  = function() { log('React 18.2.0 lastet OK', true); loadReactDOM(); };
    s1.onerror = function() { log('React 18.2.0 FEILET — CDN blokkert?', false); };
    document.head.appendChild(s1);

    function loadReactDOM() {
      var s2 = document.createElement('script');
      s2.crossOrigin = 'anonymous';
      s2.src = 'https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js';
      s2.onload  = function() { log('ReactDOM 18.2.0 lastet OK', true); loadBabel(); };
      s2.onerror = function() { log('ReactDOM 18.2.0 FEILET', false); };
      document.head.appendChild(s2);
    }

    function loadBabel() {
      var s3 = document.createElement('script');
      s3.src = 'https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js';
      s3.onload  = function() { log('Babel 7.23.5 lastet OK', true); testRender(); };
      s3.onerror = function() { log('Babel 7.23.5 FEILET', false); };
      document.head.appendChild(s3);
    }

    function testRender() {
      try {
        log('React tilgjengelig: ' + (typeof React !== 'undefined'), typeof React !== 'undefined');
        log('ReactDOM tilgjengelig: ' + (typeof ReactDOM !== 'undefined'), typeof ReactDOM !== 'undefined');
        log('Babel tilgjengelig: ' + (typeof Babel !== 'undefined'), typeof Babel !== 'undefined');
        log('Alle CDN-er OK — problemet er i app-koden', true);
      } catch(e) {
        log('Feil: ' + e.message, false);
      }
    }
  </script>
</body>
</html>
