<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test</title>
</head>
<body>
  <div id="root"></div>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <script type="text/babel" data-presets="react">
    const { useState } = React;
    function App() {
      const [count, setCount] = useState(0);
      return (
        <div style={{ background:"#0a0a0f", color:"white", padding:40, fontFamily:"monospace", minHeight:"100vh" }}>
          <h1>🏁 Gokart Strategi — TEST</h1>
          <p>Hvis du ser denne teksten fungerer React og Babel.</p>
          <button onClick={() => setCount(c => c+1)} style={{ marginTop:20, padding:"10px 20px", fontSize:16 }}>
            Klikk meg: {count}
          </button>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
