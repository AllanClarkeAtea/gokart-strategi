// ─── Helpers ──────────────────────────────────────────────────────────────────
function fmt(min) {
  if (min == null || isNaN(min)) return "--:--";
  const sign = min < 0 ? "-" : "";
  const abs  = Math.abs(min);
  const m    = Math.floor(abs);
  const s    = Math.round((abs - m) * 60);
  return `${sign}${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
}

function getBoostWindows(mode, boostInterval = 10, boostDuration = 1) {
  if (mode !== "boost") return [];
  const w = [];
  for (let t = boostInterval; t < RACE_DURATION; t += boostInterval)
    w.push({ start: t, end: t + boostDuration });
  return w;
}

function shiftPastBoost(pitEntry, windows, lapTimeSec) {
  const warmup = (lapTimeSec / 60) * 2;
  for (const bw of windows) {
    const avoidFrom = bw.start - warmup - PIT_DURATION_MIN;
    const avoidTo   = bw.end;
    if (pitEntry > avoidFrom && pitEntry < avoidTo) pitEntry = avoidTo + 0.05;
  }
  return pitEntry;
}

function inBoostWindow(pitEntry, windows) {
  return windows.some(bw => pitEntry >= bw.start && pitEntry <= bw.end);
}

// ─── Core: build remaining stints from current race clock ────────────────────
//
// This function is the heart of the adaptive engine.
// It receives:
//   - drivers          : full driver config array
//   - mode             : "boost" | "nboost"
//   - raceClockNow     : current race clock in minutes (when next driver exits pit)
//   - driverTimeUsed   : [minutes driven per driver so far]
//   - driverStintsUsed : [number of stints per driver so far]
//   - completedCount   : how many stints are done
//   - minTotalPits     : global rule (7), already-done pits counted externally
//   - pitsDone         : how many pit stops have occurred so far
//
// It returns an array of planned stints (not yet driven).
//
function buildRemainingStints({ drivers, mode, raceClockNow, driverTimeUsed,
  driverStintsUsed, completedCount, pitsDone, kart1 = "", kart2 = "",
  boostInterval = 10, boostDuration = 1 }) {

  const bw          = getBoostWindows(mode, boostInterval, boostDuration);
  const numDrivers  = drivers.length;
  const timeLeft    = RACE_DURATION - raceClockNow;
  if (timeLeft <= 0) return [];

  // How many pit stops are still required to meet the 7-stop minimum?
  const pitsStillRequired = Math.max(0, MIN_TOTAL_PITS - pitsDone);

  // ── Step 1: figure out how many stints we need ──
  // We want to distribute time as evenly as possible, but:
  //   - Each stint is capped at MAX_STINT (20 min), planned up to MAX_STINT - PIT_BOARD_BEFORE
  //   - We must do at least pitsStillRequired more pit stops
  //   - Each driver should get at least one remaining stint if possible

  // Minimum stints = pitsStillRequired + 1 (last stint has no pit after)
  const minStints = pitsStillRequired + 1;

  // How many stints do we NEED just to fit the remaining time within MAX_STINT?
  const stintsNeededForTime = Math.ceil(timeLeft / (MAX_STINT - PIT_BOARD_BEFORE));

  // How many stints to give every driver at least one go?
  // (only drivers who have fewer stints than average get priority)
  const avgStints = (completedCount + minStints) / numDrivers;
  const driversNeedingStint = drivers.filter((_, i) => driverStintsUsed[i] < Math.ceil(avgStints)).length;

  let numStints = Math.max(minStints, stintsNeededForTime, Math.min(driversNeedingStint, numDrivers));

  // Safety: ensure we don't create stints shorter than MIN_STINT
  const drivingTime = timeLeft - (numStints - 1) * PIT_DURATION_MIN;
  if (drivingTime / numStints < MIN_STINT && numStints > minStints) {
    // Too many stints would create too-short stints, reduce
    while (numStints > minStints) {
      const dt = timeLeft - (numStints - 1) * PIT_DURATION_MIN;
      if (dt / numStints >= MIN_STINT) break;
      numStints--;
    }
  }

  // ── Step 2: assign stints to drivers ──
  // Goal: equalise total driving time across all drivers
  const overallTotalDrive = RACE_DURATION - (completedCount + numStints - 1) * PIT_DURATION_MIN;
  const fairShare = overallTotalDrive / numDrivers; // target total per driver

  // Remaining share per driver
  const remainingShare = drivers.map((_, i) => Math.max(0, fairShare - driverTimeUsed[i]));
  const totalRemShare   = remainingShare.reduce((a, b) => a + b, 0);

  // How many stints each driver gets in the remaining portion
  // Weighted by their remaining share
  let stintAlloc = drivers.map((_, i) => {
    return Math.max(0, Math.round((remainingShare[i] / (totalRemShare || 1)) * numStints));
  });

  // Fix rounding so sum = numStints
  let diff = numStints - stintAlloc.reduce((a, b) => a + b, 0);
  while (diff !== 0) {
    const dir = diff > 0 ? 1 : -1;
    // Add/remove from driver with most/least remaining share
    let pick = 0;
    for (let d = 1; d < numDrivers; d++) {
      if (dir > 0 ? remainingShare[d] > remainingShare[pick] : stintAlloc[d] > stintAlloc[pick])
        pick = d;
    }
    stintAlloc[pick] += dir;
    diff -= dir;
    if (stintAlloc[pick] < 0) stintAlloc[pick] = 0;
  }

  // Ensure every driver with remaining share > 0 gets at least 1 stint if capacity allows
  for (let d = 0; d < numDrivers; d++) {
    if (remainingShare[d] > 0 && stintAlloc[d] === 0 && numStints > 0) {
      // Steal from the driver with the most allocated stints
      const giver = stintAlloc.indexOf(Math.max(...stintAlloc));
      if (stintAlloc[giver] > 1) { stintAlloc[giver]--; stintAlloc[d]++; }
    }
  }

  // Build ordered assignment: round-robin weighted by allocation
  const assignment = [];
  const tempAlloc  = [...stintAlloc];
  for (let s = 0; s < numStints; s++) {
    // Pick driver with most remaining allocation who hasn't gone "too recently"
    let best = -1;
    for (let d = 0; d < numDrivers; d++) {
      if (tempAlloc[d] <= 0) continue;
      // Avoid same driver twice in a row unless forced
      if (assignment.length > 0 && assignment[assignment.length - 1] === d && numDrivers > 1) continue;
      if (best === -1 || tempAlloc[d] > tempAlloc[best]) best = d;
    }
    if (best === -1) {
      // Forced same driver or leftovers
      best = tempAlloc.findIndex((v, i) => v > 0);
      if (best === -1) best = s % numDrivers;
    }
    assignment.push(best);
    tempAlloc[best]--;
  }

  // ── Step 3: calculate stint durations ──
  const stintTimeTarget = drivers.map((_, i) => remainingShare[i]);
  const stintsDone      = Array(numDrivers).fill(0);
  const stintsTotal     = [...stintAlloc];
  let raceClock = raceClockNow;
  const result  = [];

  for (let s = 0; s < numStints; s++) {
    const dIdx   = assignment[s];
    const isLast = s === numStints - 1;
    const lapSec = drivers[dIdx].lapTime;

    const myStintsLeft = stintsTotal[dIdx] - stintsDone[dIdx];
    let dur = myStintsLeft > 0 ? stintTimeTarget[dIdx] / myStintsLeft : MIN_STINT;

    // Clamp: never plan beyond (MAX_STINT - 90s) so there's always room for the pit-board lap + buffer
    dur = Math.max(MIN_STINT, Math.min(MAX_STINT - PIT_BOARD_BEFORE, dur));

    let pitEntry = isLast ? null : raceClock + dur;

    // Boost avoidance
    if (!isLast && bw.length && pitEntry != null) {
      const shifted = shiftPastBoost(pitEntry, bw, lapSec);
      if (shifted !== pitEntry) {
        dur      = Math.min(MAX_STINT - PIT_BOARD_BEFORE, Math.max(MIN_STINT, shifted - raceClock));
        pitEntry = raceClock + dur;
      }
    }

    // Last stint: use all remaining time (up to MAX_STINT)
    if (isLast) {
      dur      = Math.min(MAX_STINT, RACE_DURATION - raceClock);
      pitEntry = null;
    }

    // Guard: don't let any stint push us past race end
    if (raceClock + dur + (isLast ? 0 : PIT_DURATION_MIN) > RACE_DURATION + 0.01) {
      dur = Math.max(MIN_STINT, RACE_DURATION - raceClock - (isLast ? 0 : PIT_DURATION_MIN));
      pitEntry = isLast ? null : raceClock + dur;
    }

    const pitExit    = pitEntry != null ? pitEntry + PIT_DURATION_MIN : null;
    // Pit board = 90 seconds before the planned end of this stint
    const pitBoardAt = pitEntry != null ? parseFloat((raceClock + dur - PIT_BOARD_BEFORE).toFixed(3)) : null;

    const stintNumber = completedCount + s + 1;
    const kartNum     = stintNumber % 2 === 1 ? kart1 : kart2; // odd=kart1, even=kart2

    result.push({
      stint:          stintNumber,
      kartNum,
      driver:         dIdx,
      driverName:     drivers[dIdx].name,
      startTime:      parseFloat(raceClock.toFixed(3)),
      duration:       parseFloat(dur.toFixed(3)),
      endTime:        parseFloat((raceClock + dur).toFixed(3)),
      pitEntry:       pitEntry    != null ? parseFloat(pitEntry.toFixed(3))    : null,
      pitExit:        pitExit     != null ? parseFloat(pitExit.toFixed(3))     : null,
      pitBoardAt:     pitBoardAt  != null ? parseFloat(pitBoardAt.toFixed(3))  : null,
      estimatedLaps:  Math.floor((dur * 60) / lapSec),
      inBoostConflict: pitEntry != null && inBoostWindow(pitEntry, bw),
      isCompleted:    false,
      isPlanned:      true,
    });

    stintTimeTarget[dIdx] -= dur;
    stintsDone[dIdx]++;
    raceClock = pitExit != null ? pitExit : raceClock + dur;
  }

  return result;
}

// ─── Recompute full schedule after recording actual pit exit ──────────────────) {

    race:  { schedule, completedStints, actualLaps, adjustLog,
             raceStarted, raceStartTime },
  });

    if (!kvKey.trim()) return;
    setKvStatus("saving");
    try {
      const res = await fetch(`${KV_API}/?key=${encodeURIComponent(kvKey.trim())}`, {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body:    JSON.stringify(collectState()),
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      setKvStatus("saved");
      setKvLastSaved(new Date());
      setTimeout(() => setKvStatus(""), 3000);
    } catch (err) {
      console.error("KV save error:", err);
      setKvStatus("error");
      setTimeout(() => setKvStatus(""), 5000);
    }
  };

  // Load from KV and restore all state
  const kvLoad = async () => {
    if (!kvKey.trim()) return;
    setKvStatus("loading");
    try {
      const res = await fetch(`${KV_API}/?key=${encodeURIComponent(kvKey.trim())}`);
      if (res.status === 404) { setKvStatus("notfound"); setTimeout(()=>setKvStatus(""),4000); return; }
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();

      // Restore setup
      if (data.setup) {
        const s = data.setup;
        if (s.numDrivers)   setNumDrivers(s.numDrivers);
        if (s.mode)         setMode(s.mode);
        if (s.boostInterval !== undefined) setBoostInterval(s.boostInterval);
        if (s.boostDuration !== undefined) setBoostDuration(s.boostDuration);
        if (s.kart1 !== undefined) setKart1(s.kart1);
        if (s.kart2 !== undefined) setKart2(s.kart2);
        if (s.drivers)      setDrivers(s.drivers);

      if (data.race) {
        const r = data.race;
        if (r.schedule)         setSchedule(r.schedule);
        if (r.completedStints)  setCompleted(r.completedStints);
        if (r.actualLaps)       setActualLaps(r.actualLaps);
        if (r.adjustLog)        setAdjustLog(r.adjustLog);
        if (r.raceStarted !== undefined) setRaceStarted(r.raceStarted);
        if (r.raceStartTime)    setRaceStartTime(r.raceStartTime);
        // If race was active, go to race page

      setTimeout(() => setKvStatus(""), 3000);

      console.error("KV load error:", err);
      setKvStatus("error");
      setTimeout(() => setKvStatus(""), 5000);

  const nextStint       = schedule[currentStintIdx + 1];

      isPlanned:     false,
      actualStart:   currentStintStart,
      actualEnd:     actualPitEntry,
      actualDuration: parseFloat(Math.max(0, actualDuration).toFixed(3)),
    };

    const newCompleted = [...completedStints, donestint];

    // Recompute remaining stints
    const driverTimeUsed   = Array(drivers.length).fill(0);
    const driverStintsUsed = Array(drivers.length).fill(0);
    newCompleted.forEach(c => {
      driverTimeUsed[c.driver]   += c.actualDuration != null ? c.actualDuration : c.duration;
      driverStintsUsed[c.driver] += 1;
    });

    const remaining = buildRemainingStints({
      drivers, mode, kart1, kart2, boostInterval, boostDuration,
      raceClockNow:     actualExitMin,
      driverTimeUsed,
      driverStintsUsed,
      completedCount:   newCompleted.length,
      pitsDone:         newCompleted.length,
    });

    const newSchedule = [...newCompleted, ...remaining];
    setSchedule(newSchedule);
    setCompleted(newCompleted);
    setManualTime("");

    // Build adjustment log entry
    const plannedEntry = currentStint.pitEntry;
    const delta        = plannedEntry != null ? actualPitEntry - plannedEntry : null;
    const extraPits    = remaining.length - (schedule.length - currentStintIdx - 1);
    setAdjustLog(prev => [...prev, {
      stint:       currentStint.stint,
      driver:      currentStint.driverName,
      planned:     plannedEntry,
      actual:      actualPitEntry,
      delta,
      newStints:   remaining.length,
      extraPits:   extraPits > 0 ? extraPits : 0,
      note,
      timestamp:   fmt(raceElapsed),
    }]);
  };

  const handleNumDrivers = (n) => {
    setNumDrivers(n);
    setDrivers(prev => {
      const next = [...prev];
      while (next.length < n) next.push({ name: `Fører ${next.length + 1}`, lapTime: 58, lapTimeStr: "58,0" });
      return next.slice(0, n);
    });
  };
  const updateDriver = (i, f, v) =>
    setDrivers(prev => prev.map((d, idx) => idx === i ? { ...d, [f]: v } : d));

  // Parse lap time string like "36,1" or "36.1" or "36" → seconds as float
  const parseLapTime = (str) => {
    if (!str && str !== 0) return null;
    const normalized = String(str).replace(",", ".");
    const val = parseFloat(normalized);
    return isNaN(val) ? null : Math.max(10, Math.min(180, val));
  };

  // Format lap time float back to display string with comma
  const fmtLapTime = (sec) => {
    if (sec == null) return "";
    // Show one decimal only if needed
    const rounded = Math.round(sec * 10) / 10;
    return String(rounded).replace(".", ",");
  };

  const bw = getBoostWindows(mode, boostInterval, boostDuration);

  const driverSummary = drivers.map((d, i) => {
    const stints = schedule.filter(s => s.driver === i);
    const done   = stints.filter(s => s.isCompleted);
    return {
      name:      d.name,
      totalTime: stints.reduce((sum, s) => sum + (s.actualDuration != null ? s.actualDuration : s.duration), 0),
      stints:    stints.length,
      done:      done.length,
      totalLaps: stints.reduce((sum, s) => sum + (actualLaps[s.stint] != null ? actualLaps[s.stint] : (s.estimatedLaps || 0)), 0),
    };
  });

  // Helper: effective laps for a stint (manual override wins)
  const effLaps = (s) => actualLaps[s.stint] != null ? actualLaps[s.stint] : (s.estimatedLaps || 0);
  const totalEstLaps   = schedule.reduce((sum, s) => sum + (s.estimatedLaps || 0), 0);
  const totalEffLaps   = schedule.reduce((sum, s) => sum + effLaps(s), 0);
  const hasLapOverride = Object.keys(actualLaps).length > 0;

  const totalPitsPlanned = schedule.length - 1;
  const warningPits      = totalPitsPlanned < MIN_TOTAL_PITS;

  // ── SETUP PAGE ──────────────────────────────────────────────────────────────
  if (page === "setup") return (
    <div style={S.page}>
      <A11yStyles />
      <a href="#main-content" className="skip-link">Hopp til hovedinnhold</a>
      <AppHeader />
      <div style={{ maxWidth:680, margin:"0 auto", padding:"20px 16px", display:"flex", flexDirection:"column", gap:14 }}>

        <Card title="LØPSMODUS">
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8, marginBottom: mode==="boost"?14:0 }}>
            {[
              ["speed4",  "🏎 Speed 4",          "Uten boost"],
              ["boost",   "⚡ Speed 4 + Boost",   "Konfigurerbar boost"],
              ["nboost",  "🏁 Speed 5",           "Uten boost"],
            ].map(([v,l,s]) => (
              <ModeBtn key={v} active={mode===v} onClick={()=>setMode(v)} label={l} sub={s} />
            ))}
          </div>

          {mode === "boost" && (
            <div style={{ background:"#0a0a0f", borderRadius:6, padding:"14px 14px 10px", border:"1px solid #2a2a3a" }}>
              <div style={{ fontSize:12, color:COL_ACCENT, letterSpacing:2, marginBottom:12 }}>⚡ BOOST-KONFIGURASJON</div>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>

                {/* Boost interval */}
                <div>
                  <label htmlFor="boost-interval" style={{ display:"block", fontSize:12, color:TXT_SECONDARY, marginBottom:6 }}>Boost hvert X minutt</label>
                  <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                    <input id="boost-interval" type="number" min={5} max={30} step={1} value={boostInterval}
                      aria-describedby="boost-interval-hint"
                      onChange={e => setBoostInterval(Math.max(5, Math.min(30, parseInt(e.target.value)||10)))}
                      style={{ ...S.input, width:72, fontSize:18, fontWeight:900, color:COL_ACCENT, textAlign:"center", padding:"6px 4px" }} />
                    <span style={{ fontSize:12, color:TXT_MUTED }} aria-hidden="true">min</span>
                  </div>
                  <div id="boost-interval-hint" style={{ fontSize:12, color:TXT_MUTED, marginTop:4 }}>
                    → {Math.floor((RACE_DURATION - 1) / boostInterval)} boosts i løpet
                  </div>
                </div>

                {/* Boost duration */}
                <div>
                  <label htmlFor="boost-duration" style={{ display:"block", fontSize:12, color:TXT_SECONDARY, marginBottom:6 }}>Boost varer i X sekunder</label>
                  <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                    <input id="boost-duration" type="number" min={15} max={180} step={5} value={Math.round(boostDuration * 60)}
                      aria-describedby="boost-duration-hint"
                      onChange={e => setBoostDuration(Math.max(15, Math.min(180, parseInt(e.target.value)||60)) / 60)}
                      style={{ ...S.input, width:72, fontSize:18, fontWeight:900, color:COL_ACCENT, textAlign:"center", padding:"6px 4px" }} />
                    <span style={{ fontSize:12, color:TXT_MUTED }} aria-hidden="true">sek</span>
                  </div>
                  <div id="boost-duration-hint" style={{ fontSize:12, color:TXT_MUTED, marginTop:4 }}>
                    = {boostDuration >= 1 ? `${boostDuration.toFixed(1)} min` : `${Math.round(boostDuration*60)} sek`}
                  </div>
                </div>
              </div>

              {/* Preview boost windows */}
              <div style={{ marginTop:12, fontSize:12, color:TXT_MUTED }}>
                Boost-vindu: {getBoostWindows("boost", boostInterval, boostDuration).slice(0,6).map(b =>
                  `${fmt(b.start)}–${fmt(b.end)}`
                ).join("  ·  ")}{getBoostWindows("boost", boostInterval, boostDuration).length > 6 ? "  …" : ""}
              </div>
            </div>
          )}
        </Card>

        <Card title="ANTALL FØRERE">
          <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
            {[3,4,5,6,7,8].map(n => <NumBtn key={n} active={numDrivers===n} onClick={()=>handleNumDrivers(n)} label={n} />)}
          </div>
        </Card>

        <Card title="KARTNUMMER">
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
            {[
              { id:"kart-a", label:"Kart A", sub:"Oddetall stint (1, 3, 5…)", val:kart1, set:setKart1 },
              { id:"kart-b", label:"Kart B", sub:"Partall stint (2, 4, 6…)",  val:kart2, set:setKart2 },
            ].map(k => (
              <div key={k.label} style={{ background:"#111", borderRadius:6, padding:"12px 14px",
                border:"1px solid #2a2a3a" }}>
                <label htmlFor={k.id} style={{ display:"block", fontSize:13, color:COL_DANGER, letterSpacing:2, marginBottom:8, fontWeight:700 }}>{k.label}</label>
                <input
                  id={k.id}
                  type="number" min={1} max={99}
                  placeholder="–"
                  aria-describedby={`${k.id}-hint`}
                  value={k.val}
                  onChange={e => {
                    const v = e.target.value;
                    if (v === "" || (parseInt(v) >= 1 && parseInt(v) <= 99)) k.set(v);
                  }}
                  style={{ ...S.input, width:"100%", fontSize:22, fontWeight:900,
                    color:COL_ACCENT, textAlign:"center", padding:"8px 4px" }}
                />
                <div id={`${k.id}-hint`} style={{ fontSize:12, color:TXT_MUTED, marginTop:6, textAlign:"center" }}>{k.sub}</div>
              </div>
            ))}
          </div>
        </Card>

        <Card title="FØRER-OPPSETT">
          {drivers.map((d, i) => {
            const nameId = `driver-name-${i}`;
            const lapId  = `driver-lap-${i}`;
            return (
            <div key={i} style={{ marginBottom:12 }}>
              <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:6 }}>
                <Dot color={COLORS[i]} label={`Fører ${i+1} farge`} />
                <label htmlFor={nameId} className="sr-only">Navn på fører {i+1}</label>
                <input id={nameId} value={d.name} onChange={e=>updateDriver(i,"name",e.target.value)} style={S.input} />
              </div>
              <div style={{ display:"flex", alignItems:"center", gap:8, paddingLeft:18 }}>
                <label htmlFor={lapId} style={{ fontSize:12, color:TXT_MUTED, minWidth:120 }}>
                  Rundetid (sek)
                </label>
                <input
                  id={lapId}
                  type="text"
                  inputMode="decimal"
                  placeholder="36,1"
                  aria-describedby={`${lapId}-hint`}
                  value={d.lapTimeStr != null ? d.lapTimeStr : fmtLapTime(d.lapTime)}
                  onChange={e => {
                    const raw = e.target.value;
                    const parsed = parseLapTime(raw);
                    updateDriver(i, "lapTimeStr", raw);
                    if (parsed != null) updateDriver(i, "lapTime", parsed);
                  }}
                  onBlur={e => {
                    const parsed = parseLapTime(e.target.value);
                    if (parsed != null) {
                      updateDriver(i, "lapTimeStr", fmtLapTime(parsed));
                      updateDriver(i, "lapTime", parsed);
                    }
                  }}
                  style={{ ...S.input, width:80, color:COL_ACCENT, fontWeight:700,
                    letterSpacing:1, textAlign:"center" }}
                />
                <span id={`${lapId}-hint`} style={{ fontSize:12, color:TXT_MUTED }}>
                  = {(() => {
                    const t = d.lapTime;
                    const m = Math.floor(t / 60);
                    const s = (t % 60).toFixed(1).replace(".", ",");
                    return m > 0 ? `${m}m ${s}s` : `${s}s`;
                  })()} · {(d.lapTime / 60).toFixed(3)} min
                </span>
              </div>
            </div>
            );
          })}
        </Card>

        <Card title="REGLER">
          <div style={{ fontSize:11, color:TXT_MUTED, lineHeight:2 }}>
            <div>⏱ Løpslengde: <b style={{color:TXT_SECONDARY}}>120 min</b></div>
            <div>🛑 Min. pitstop: <b style={{color:TXT_SECONDARY}}>7 (= 8 stints)</b></div>
            <div>⏳ Pitstop-tid: <b style={{color:TXT_SECONDARY}}>50 sek</b></div>
            <div>🪧 Pit-skilt <b style={{color:COL_WARNING}}>90 sek før planlagt stint-slutt</b> → fører kjører én runde til</div>
            <div>⚠️ Maks stinttid: <b style={{color:COL_DANGER}}>20:00</b></div>
            {mode === "boost"
              ? <div>⚡ Boost: <b style={{color:COL_ACCENT}}>hvert {boostInterval} min, {Math.round(boostDuration*60)} sek varighet</b></div>
              : <div>🚫 Ingen boost aktivert</div>
            }
            <div>👤 Stint: <b style={{color:TXT_SECONDARY}}>7–20 min</b></div>
          </div>
        </Card>

        <button onClick={buildInitial} aria-label="Beregn strategi basert på oppgitte verdier" style={S.primaryBtn}><span aria-hidden="true">⚡ </span>BEREGN STRATEGI</button>

        {/* ── KV Sync Panel ── */}
        <KvPanel kvKey={kvKey} setKvKey={setKvKey} kvStatus={kvStatus}
          kvLastSaved={kvLastSaved} kvSave={kvSave} kvLoad={kvLoad}
          kvPanel={kvPanel} setKvPanel={setKvPanel} kvApi={KV_API} />
      </div>
    </div>
  );

  
  return <div style={{color:"white",padding:40}}>SETUP RENDER OK</div>;
}
function AppHeader() {
  return (
    <div style={{ background:"linear-gradient(135deg,#1a0a2e,#0d1117 50%,#0a1a0a)",
      borderBottom:"2px solid #FF4136", padding:"14px 22px",
      display:"flex", alignItems:"center", gap:14 }}>
      <span aria-hidden="true" style={{ fontSize:26 }}>🏁</span>
      <div>
        <div style={{ fontSize:17, fontWeight:900, letterSpacing:4, color:"#fff" }}>GOKART STRATEGI</div>
        <div style={{ fontSize:11, letterSpacing:3, color:COL_DANGER, marginTop:2 }}>BEDRIFTSSERIEN · RACE STRATEGY TOOL</div>
      </div>
    </div>
  );
}
function Card({ title, children }) {
  return (
    <div style={{ background:"#0d0d14", borderRadius:8, padding:14, border:"1px solid #1a1a2e" }}>
      <div style={{ fontSize:12, letterSpacing:3, color:COL_DANGER, marginBottom:12, fontWeight:900 }}>{title}</div>
      {children}
    </div>
  );
}
function ModeBtn({ active, onClick, label, sub }) {
  return (
    <button onClick={onClick} aria-pressed={active} style={{ background:active?COL_DANGER:"#111",
      border:`2px solid ${active?COL_DANGER:"#2a2a3a"}`, color:active?"#000":TXT_PRIMARY,
      borderRadius:6, padding:"11px 8px", cursor:"pointer", textAlign:"center", minHeight:44 }}>
      <div style={{ fontSize:13, fontWeight:700, fontFamily:"'Courier New',monospace" }}>{label}</div>
      <div style={{ fontSize:12, color:active?"#1a0000":TXT_MUTED, marginTop:3 }}>{sub}</div>
    </button>
  );
}
function NumBtn({ active, onClick, label }) {
  return (
    <button onClick={onClick} aria-pressed={active} aria-label={`${label} førere`} style={{ width:44, height:44,
      background:active?COL_DANGER:"#111", border:`2px solid ${active?COL_DANGER:"#2a2a3a"}`,
      color:active?"#000":TXT_PRIMARY, borderRadius:6, cursor:"pointer",
      fontWeight:700, fontSize:14, fontFamily:"'Courier New',monospace" }}>
      {label}
    </button>
  );
}
function TabBtn({ id, active, onClick, label }) {
  return (
    <button id={id} onClick={onClick} role="tab" aria-selected={active} style={{ background:active?"#1a1a2e":"transparent",
      border:"none", borderBottom:`2px solid ${active?COL_DANGER:"transparent"}`,
      color:active?"#fff":TXT_SECONDARY, padding:"12px 14px", cursor:"pointer",
      fontSize:12, letterSpacing:2, fontFamily:"'Courier New',monospace",
      fontWeight:700, marginBottom:-2, minHeight:44 }}>
      {label}
    </button>
  );
}
function ClockBlock({ label, value, color, ariaLabel }) {
  return (
    <div role="timer" aria-label={ariaLabel || `${label}: ${value}`} aria-live="polite">
      <div style={{ fontSize:11, color:TXT_MUTED, letterSpacing:2 }} aria-hidden="true">{label}</div>
      <div style={{ fontSize:24, fontWeight:900, color:color||TXT_PRIMARY, lineHeight:1.1 }} aria-hidden="true">{value}</div>
    </div>
  );
}
function Dot({ color, size=8, label }) {
  return <span aria-hidden="true" style={{ display:"inline-block", width:size, height:size, borderRadius:"50%", background:color, flexShrink:0 }} />;
}
function Row({ label, value, color }) {
  return (
    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:6 }}>
      <span style={{ fontSize:12, color:TXT_MUTED }}>{label}</span>
      <span style={{ fontSize:12, fontWeight:700, color:color||TXT_PRIMARY }}>{value}</span>
    </div>
  );
}
function BigStat({ label, value, color }) {
  return (
    <div style={{ textAlign:"center" }}>
      <div style={{ fontSize:22, fontWeight:900, color:color||COL_DANGER, lineHeight:1 }}>{value}</div>
      <div style={{ fontSize:11, color:TXT_MUTED, marginTop:4, letterSpacing:1 }}>{label}</div>
    </div>
  );
}

L('Alle seksjoner lastet OK', true);
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<GokartStrategy />);
L('render() OK!', true);
} catch(e) { L('FEIL: ' + e.message + ' | ' + (e.stack||'').split('\n')[1], false); }
  </script>
</body></html>
