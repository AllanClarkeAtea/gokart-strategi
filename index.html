<body>
  <div id="root"></div>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>

  <script type="text/babel" data-presets="react">
const { useState, useCallback, useEffect } = React;

// ─── Constants ────────────────────────────────────────────────────────────────
const RACE_DURATION    = 120;
const PIT_DURATION_MIN = 50 / 60;
const MIN_TOTAL_PITS   = 7;            // minimum 7 pit stops = 8 stints
const MIN_STINT        = 7;            // minutes
const MAX_STINT        = 20;           // hard rule
const PIT_BOARD_BEFORE = 1.5;          // show pit board 90 seconds (1.5 min) before planned stint end
const COLORS = ["#FF6B6B","#FFA94D","#FFE066","#69DB7C","#4DABF7","#DA77F2","#FF8FB3","#7CFFAD"];

// ─── A11y Color Tokens — all meet WCAG AA against #0a0a0f / #111 ────────────
const TXT_PRIMARY   = "#F4F4F8";  // body text (~16:1 vs #111)
const TXT_SECONDARY = "#B8B8C4";  // secondary text (~8:1 vs #111)
const TXT_MUTED     = "#9A9AA8";  // hint/help text (~5.5:1 vs #111) — minimum AA
const TXT_DISABLED  = "#7A7A88";  // disabled (~3.8:1 vs #111) — large/UI text only
const COL_DANGER    = "#FF6B6B";  // red for warnings/pit-in
const COL_WARNING   = "#FFA94D";  // orange for pit-board
const COL_SUCCESS   = "#69DB7C";  // green for completed/pit-out
const COL_ACCENT    = "#FFE066";  // yellow for boost/active stint
const COL_INFO      = "#4DABF7";  // blue for laps

// ─── Helpers ──────────────────────────────────────────────────────────────────
function fmt(min) {
  if (min == null || isNaN(min)) return "--:--";
  const sign = min < 0 ? "-" : "";
  const abs  = Math.abs(min);
  const m    = Math.floor(abs);
  const s    = Math.round((abs - m) * 60);
  return `${sign}${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
}

function getBoostWindows(mode, boostInterval = 10, boostDuration = 1) {
  if (mode !== "boost") return [];
  const w = [];
  for (let t = boostInterval; t < RACE_DURATION; t += boostInterval)
    w.push({ start: t, end: t + boostDuration });
  return w;
}

function shiftPastBoost(pitEntry, windows, lapTimeSec) {
  const warmup = (lapTimeSec / 60) * 2;
  for (const bw of windows) {
    const avoidFrom = bw.start - warmup - PIT_DURATION_MIN;
    const avoidTo   = bw.end;
    if (pitEntry > avoidFrom && pitEntry < avoidTo) pitEntry = avoidTo + 0.05;
  }
  return pitEntry;
}

function inBoostWindow(pitEntry, windows) {
  return windows.some(bw => pitEntry >= bw.start && pitEntry <= bw.end);
}

// ─── Core: build remaining stints from current race clock ────────────────────
//
// This function is the heart of the adaptive engine.
// It receives:
//   - drivers          : full driver config array
//   - mode             : "boost" | "nboost"
//   - raceClockNow     : current race clock in minutes (when next driver exits pit)
//   - driverTimeUsed   : [minutes driven per driver so far]
//   - driverStintsUsed : [number of stints per driver so far]
//   - completedCount   : how many stints are done
//   - minTotalPits     : global rule (7), already-done pits counted externally
//   - pitsDone         : how many pit stops have occurred so far
//
// It returns an array of planned stints (not yet driven).
//
function buildRemainingStints({ drivers, mode, raceClockNow, driverTimeUsed,
  driverStintsUsed, completedCount, pitsDone, kart1 = "", kart2 = "",
  boostInterval = 10, boostDuration = 1 }) {

  const bw          = getBoostWindows(mode, boostInterval, boostDuration);
  const numDrivers  = drivers.length;
  const timeLeft    = RACE_DURATION - raceClockNow;
  if (timeLeft <= 0) return [];

  // How many pit stops are still required to meet the 7-stop minimum?
  const pitsStillRequired = Math.max(0, MIN_TOTAL_PITS - pitsDone);

  // ── Step 1: figure out how many stints we need ──
  // We want to distribute time as evenly as possible, but:
  //   - Each stint is capped at MAX_STINT (20 min), planned up to MAX_STINT - PIT_BOARD_BEFORE
  //   - We must do at least pitsStillRequired more pit stops
  //   - Each driver should get at least one remaining stint if possible

  // Minimum stints = pitsStillRequired + 1 (last stint has no pit after)
  const minStints = pitsStillRequired + 1;

  // How many stints do we NEED just to fit the remaining time within MAX_STINT?
  const stintsNeededForTime = Math.ceil(timeLeft / (MAX_STINT - PIT_BOARD_BEFORE));

  // How many stints to give every driver at least one go?
  // (only drivers who have fewer stints than average get priority)
  const avgStints = (completedCount + minStints) / numDrivers;
  const driversNeedingStint = drivers.filter((_, i) => driverStintsUsed[i] < Math.ceil(avgStints)).length;

  let numStints = Math.max(minStints, stintsNeededForTime, Math.min(driversNeedingStint, numDrivers));

  // Safety: ensure we don't create stints shorter than MIN_STINT
  const drivingTime = timeLeft - (numStints - 1) * PIT_DURATION_MIN;
  if (drivingTime / numStints < MIN_STINT && numStints > minStints) {
    // Too many stints would create too-short stints, reduce
    while (numStints > minStints) {
      const dt = timeLeft - (numStints - 1) * PIT_DURATION_MIN;
      if (dt / numStints >= MIN_STINT) break;
      numStints--;
    }
  }

  // ── Step 2: assign stints to drivers ──
  // Goal: equalise total driving time across all drivers
  const overallTotalDrive = RACE_DURATION - (completedCount + numStints - 1) * PIT_DURATION_MIN;
  const fairShare = overallTotalDrive / numDrivers; // target total per driver

  // Remaining share per driver
  const remainingShare = drivers.map((_, i) => Math.max(0, fairShare - driverTimeUsed[i]));
  const totalRemShare   = remainingShare.reduce((a, b) => a + b, 0);

  // How many stints each driver gets in the remaining portion
  // Weighted by their remaining share
  let stintAlloc = drivers.map((_, i) => {
    return Math.max(0, Math.round((remainingShare[i] / (totalRemShare || 1)) * numStints));
  });

  // Fix rounding so sum = numStints
  let diff = numStints - stintAlloc.reduce((a, b) => a + b, 0);
  while (diff !== 0) {
    const dir = diff > 0 ? 1 : -1;
    // Add/remove from driver with most/least remaining share
    let pick = 0;
    for (let d = 1; d < numDrivers; d++) {
      if (dir > 0 ? remainingShare[d] > remainingShare[pick] : stintAlloc[d] > stintAlloc[pick])
        pick = d;
    }
    stintAlloc[pick] += dir;
    diff -= dir;
    if (stintAlloc[pick] < 0) stintAlloc[pick] = 0;
  }

  // Ensure every driver with remaining share > 0 gets at least 1 stint if capacity allows
  for (let d = 0; d < numDrivers; d++) {
    if (remainingShare[d] > 0 && stintAlloc[d] === 0 && numStints > 0) {
      // Steal from the driver with the most allocated stints
      const giver = stintAlloc.indexOf(Math.max(...stintAlloc));
      if (stintAlloc[giver] > 1) { stintAlloc[giver]--; stintAlloc[d]++; }
    }
  }

  // Build ordered assignment: round-robin weighted by allocation
  const assignment = [];
  const tempAlloc  = [...stintAlloc];
  for (let s = 0; s < numStints; s++) {
    // Pick driver with most remaining allocation who hasn't gone "too recently"
    let best = -1;
    for (let d = 0; d < numDrivers; d++) {
      if (tempAlloc[d] <= 0) continue;
      // Avoid same driver twice in a row unless forced
      if (assignment.length > 0 && assignment[assignment.length - 1] === d && numDrivers > 1) continue;
      if (best === -1 || tempAlloc[d] > tempAlloc[best]) best = d;
    }
    if (best === -1) {
      // Forced same driver or leftovers
      best = tempAlloc.findIndex((v, i) => v > 0);
      if (best === -1) best = s % numDrivers;
    }
    assignment.push(best);
    tempAlloc[best]--;
  }

  // ── Step 3: calculate stint durations ──
  const stintTimeTarget = drivers.map((_, i) => remainingShare[i]);
  const stintsDone      = Array(numDrivers).fill(0);
  const stintsTotal     = [...stintAlloc];
  let raceClock = raceClockNow;
  const result  = [];

  for (let s = 0; s < numStints; s++) {
    const dIdx   = assignment[s];
    const isLast = s === numStints - 1;
    const lapSec = drivers[dIdx].lapTime;

    const myStintsLeft = stintsTotal[dIdx] - stintsDone[dIdx];
    let dur = myStintsLeft > 0 ? stintTimeTarget[dIdx] / myStintsLeft : MIN_STINT;

    // Clamp: never plan beyond (MAX_STINT - 90s) so there's always room for the pit-board lap + buffer
    dur = Math.max(MIN_STINT, Math.min(MAX_STINT - PIT_BOARD_BEFORE, dur));

    let pitEntry = isLast ? null : raceClock + dur;

    // Boost avoidance
    if (!isLast && bw.length && pitEntry != null) {
      const shifted = shiftPastBoost(pitEntry, bw, lapSec);
      if (shifted !== pitEntry) {
        dur      = Math.min(MAX_STINT - PIT_BOARD_BEFORE, Math.max(MIN_STINT, shifted - raceClock));
        pitEntry = raceClock + dur;
      }
    }

    // Last stint: use all remaining time (up to MAX_STINT)
    if (isLast) {
      dur      = Math.min(MAX_STINT, RACE_DURATION - raceClock);
      pitEntry = null;
    }

    // Guard: don't let any stint push us past race end
    if (raceClock + dur + (isLast ? 0 : PIT_DURATION_MIN) > RACE_DURATION + 0.01) {
      dur = Math.max(MIN_STINT, RACE_DURATION - raceClock - (isLast ? 0 : PIT_DURATION_MIN));
      pitEntry = isLast ? null : raceClock + dur;
    }

    const pitExit    = pitEntry != null ? pitEntry + PIT_DURATION_MIN : null;
    // Pit board = 90 seconds before the planned end of this stint
    const pitBoardAt = pitEntry != null ? parseFloat((raceClock + dur - PIT_BOARD_BEFORE).toFixed(3)) : null;

    const stintNumber = completedCount + s + 1;
    const kartNum     = stintNumber % 2 === 1 ? kart1 : kart2; // odd=kart1, even=kart2

    result.push({
      stint:          stintNumber,
      kartNum,
      driver:         dIdx,
      driverName:     drivers[dIdx].name,
      startTime:      parseFloat(raceClock.toFixed(3)),
      duration:       parseFloat(dur.toFixed(3)),
      endTime:        parseFloat((raceClock + dur).toFixed(3)),
      pitEntry:       pitEntry    != null ? parseFloat(pitEntry.toFixed(3))    : null,
      pitExit:        pitExit     != null ? parseFloat(pitExit.toFixed(3))     : null,
      pitBoardAt:     pitBoardAt  != null ? parseFloat(pitBoardAt.toFixed(3))  : null,
      estimatedLaps:  Math.floor((dur * 60) / lapSec),
      inBoostConflict: pitEntry != null && inBoostWindow(pitEntry, bw),
      isCompleted:    false,
      isPlanned:      true,
    });

    stintTimeTarget[dIdx] -= dur;
    stintsDone[dIdx]++;
    raceClock = pitExit != null ? pitExit : raceClock + dur;
  }

  return result;
}

// ─── Recompute full schedule after recording actual pit exit ──────────────────) {
  const pitsDone = completedStints.length; // each completed stint ended with a pit (except possibly last)

  const driverTimeUsed   = Array(drivers.length).fill(0);
  const driverStintsUsed = Array(drivers.length).fill(0);
  completedStints.forEach(c => {
    driverTimeUsed[c.driver]   += c.duration;
    driverStintsUsed[c.driver] += 1;
  });

  const remaining = buildRemainingStints({
    drivers, mode,
    raceClockNow:     actualExitMin,
    driverTimeUsed,
    driverStintsUsed,
    completedCount:   completedStints.length,
    pitsDone,
  });

  return [...completedStints, ...remaining];
}

// ─── App ──────────────────────────────────────────────────────────────────────
// ─── A11y: Global CSS styles injected via JSX style tag ─────────────────────
function A11yStyles() {
  return (
    <style>{`
      button:focus-visible,
      input:focus-visible,
      [role="tab"]:focus-visible,
      [role="button"]:focus-visible,
      a:focus-visible {
        outline: 3px solid #FFE066 !important;
        outline-offset: 2px !important;
        border-radius: 4px;
      }
      button:focus:not(:focus-visible),
      input:focus:not(:focus-visible) { outline: none; }
      .skip-link {
        position: absolute; top: -100px; left: 8px;
        background: #FFE066; color: #000; padding: 12px 18px;
        font-weight: 900; text-decoration: none; z-index: 9999;
        border-radius: 4px; font-family: 'Courier New', monospace;
      }
      .skip-link:focus { top: 8px; }
      .sr-only {
        position: absolute; width: 1px; height: 1px;
        padding: 0; margin: -1px; overflow: hidden;
        clip: rect(0,0,0,0); white-space: nowrap; border: 0;
      }
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }
      @media (prefers-contrast: more) { body { background: #000 !important; } }
      @media (pointer: coarse) {
        button, input[type="number"], input[type="text"] { min-height: 44px; }
      }
    `}</style>
  );
}

function GokartStrategy() {
  const [page,        setPage]        = useState("setup");
  const [numDrivers,  setNumDrivers]  = useState(3);
  const [mode,        setMode]        = useState("boost");
  const [boostInterval, setBoostInterval] = useState(10);  // minutes between boosts
  const [boostDuration, setBoostDuration] = useState(1);   // minutes boost lasts
  const [kart1,       setKart1]       = useState("");   // odd stints
  const [kart2,       setKart2]       = useState("");   // even stints
  const [drivers,     setDrivers]     = useState([
    { name: "Fører 1", lapTime: 55,   lapTimeStr: "55,0" },
    { name: "Fører 2", lapTime: 57,   lapTimeStr: "57,0" },
    { name: "Fører 3", lapTime: 60,   lapTimeStr: "60,0" },
  ]);

  const [schedule,       setSchedule]       = useState([]);
  const [completedStints, setCompleted]     = useState([]);
  const [actualLaps,     setActualLaps]     = useState({}); // { stintNumber: overrideValue }
  const [raceStarted,    setRaceStarted]    = useState(false);
  const [raceStartTime,  setRaceStartTime]  = useState(null);
  const [now,            setNow]            = useState(Date.now());
  const [activeTab,      setActiveTab]      = useState("live");
  const [manualTime,     setManualTime]     = useState("");
  const [adjustLog,      setAdjustLog]      = useState([]); // log of adjustments

  // Live clock
  useEffect(() => {
    if (!raceStarted) return;
    const id = setInterval(() => setNow(Date.now()), 1000);
    return () => clearInterval(id);
  }, [raceStarted]);

  const raceElapsed = raceStarted ? (now - raceStartTime) / 60000 : 0;

  // ── Initial build ──
  const buildInitial = useCallback(() => {
    const sched = buildRemainingStints({
      drivers, mode, kart1, kart2, boostInterval, boostDuration,
      raceClockNow:     0,
      driverTimeUsed:   Array(drivers.length).fill(0),
      driverStintsUsed: Array(drivers.length).fill(0),
      completedCount:   0,
      pitsDone:         0,
    });
    setSchedule(sched);
    setCompleted([]);
    setAdjustLog([]);
    setActualLaps({});
    setRaceStarted(false);
    setRaceStartTime(null);
    setPage("race");
    setActiveTab("live");
  }, [drivers, mode, kart1, kart2, boostInterval, boostDuration]);

  const startRace = () => { setRaceStarted(true); setRaceStartTime(Date.now()); };

  // Derived
  const currentStintIdx = completedStints.length;
  const currentStint    = schedule[currentStintIdx];
  const nextStint       = schedule[currentStintIdx + 1];
  const pitsDone        = completedStints.length; // stints done = pits done (except when 0)

  const currentStintStart = currentStint
    ? (currentStint.actualStart != null ? currentStint.actualStart : currentStint.startTime)
    : null;
  const timeInStint    = raceStarted && currentStintStart != null ? raceElapsed - currentStintStart : 0;
  // Pit board triggers when race clock passes the planned pitBoardAt time for this stint
  const pitBoardThreshold = currentStint?.pitBoardAt ?? null;
  const showPitBoard   = raceStarted && currentStint && pitBoardThreshold != null && raceElapsed >= pitBoardThreshold;
  const pitBoardUrgent = raceStarted && currentStint && pitBoardThreshold != null &&
    raceElapsed >= pitBoardThreshold + (drivers[currentStint?.driver]?.lapTime / 60 || 1);

  const parseManualTime = (str) => {
    if (!str.trim()) return null;
    const parts = str.split(":");
    if (parts.length === 2) return (parseInt(parts[0]) || 0) + (parseInt(parts[1]) || 0) / 60;
    return parseFloat(str) || null;
  };

  // ── Record pit: fører kjørte ut ──
  // actualExitMin = race clock when next driver exits pit
  const recordPitExit = (actualExitMin, note = "") => {
    if (!currentStint) return;

    // Determine actual duration of the stint that just ended
    // Stint started at currentStintStart, next driver out at actualExitMin - PIT_DURATION_MIN
    // (driver was in pit from pitEntry to actualExitMin)
    const actualPitEntry  = actualExitMin - PIT_DURATION_MIN;
    const actualDuration  = actualPitEntry - currentStintStart;

    const donestint = {
      ...currentStint,
      isCompleted:   true,
      isPlanned:     false,
      actualStart:   currentStintStart,
      actualEnd:     actualPitEntry,
      actualDuration: parseFloat(Math.max(0, actualDuration).toFixed(3)),
    };

    const newCompleted = [...completedStints, donestint];

    // Recompute remaining stints
    const driverTimeUsed   = Array(drivers.length).fill(0);
    const driverStintsUsed = Array(drivers.length).fill(0);
    newCompleted.forEach(c => {
      driverTimeUsed[c.driver]   += c.actualDuration ?? c.duration;
      driverStintsUsed[c.driver] += 1;
    });

    const remaining = buildRemainingStints({
      drivers, mode, kart1, kart2, boostInterval, boostDuration,
      raceClockNow:     actualExitMin,
      driverTimeUsed,
      driverStintsUsed,
      completedCount:   newCompleted.length,
      pitsDone:         newCompleted.length,
    });

    const newSchedule = [...newCompleted, ...remaining];
    setSchedule(newSchedule);
    setCompleted(newCompleted);
    setManualTime("");

    // Build adjustment log entry
    const plannedEntry = currentStint.pitEntry;
    const delta        = plannedEntry != null ? actualPitEntry - plannedEntry : null;
    const extraPits    = remaining.length - (schedule.length - currentStintIdx - 1);
    setAdjustLog(prev => [...prev, {
      stint:       currentStint.stint,
      driver:      currentStint.driverName,
      planned:     plannedEntry,
      actual:      actualPitEntry,
      delta,
      newStints:   remaining.length,
      extraPits:   extraPits > 0 ? extraPits : 0,
      note,
      timestamp:   fmt(raceElapsed),
    }]);
  };

  const handleNumDrivers = (n) => {
    setNumDrivers(n);
    setDrivers(prev => {
      const next = [...prev];
      while (next.length < n) next.push({ name: `Fører ${next.length + 1}`, lapTime: 58, lapTimeStr: "58,0" });
      return next.slice(0, n);
    });
  };
  const updateDriver = (i, f, v) =>
    setDrivers(prev => prev.map((d, idx) => idx === i ? { ...d, [f]: v } : d));

  // Parse lap time string like "36,1" or "36.1" or "36" → seconds as float
  const parseLapTime = (str) => {
    if (!str && str !== 0) return null;
    const normalized = String(str).replace(",", ".");
    const val = parseFloat(normalized);
    return isNaN(val) ? null : Math.max(10, Math.min(180, val));
  };

  // Format lap time float back to display string with comma
  const fmtLapTime = (sec) => {
    if (sec == null) return "";
    // Show one decimal only if needed
    const rounded = Math.round(sec * 10) / 10;
    return String(rounded).replace(".", ",");
  };

  const bw = getBoostWindows(mode, boostInterval, boostDuration);

  const driverSummary = drivers.map((d, i) => {
    const stints = schedule.filter(s => s.driver === i);
    const done   = stints.filter(s => s.isCompleted);
    return {
      name:      d.name,
      totalTime: stints.reduce((sum, s) => sum + (s.actualDuration ?? s.duration), 0),
      stints:    stints.length,
      done:      done.length,
      totalLaps: stints.reduce((sum, s) => sum + (actualLaps[s.stint] ?? s.estimatedLaps ?? 0), 0),
    };
  });

  // Helper: effective laps for a stint (manual override wins)
  const effLaps = (s) => actualLaps[s.stint] ?? s.estimatedLaps ?? 0;
  const totalEstLaps   = schedule.reduce((sum, s) => sum + (s.estimatedLaps || 0), 0);
  const totalEffLaps   = schedule.reduce((sum, s) => sum + effLaps(s), 0);
  const hasLapOverride = Object.keys(actualLaps).length > 0;

  const totalPitsPlanned = schedule.length - 1;
  const warningPits      = totalPitsPlanned < MIN_TOTAL_PITS;

  // ── SETUP PAGE ──────────────────────────────────────────────────────────────
  if (page === "setup") return (
    <div style={S.page}>
      <A11yStyles />
      <a href="#main-content" className="skip-link">Hopp til hovedinnhold</a>
      <AppHeader />
      <div style={{ maxWidth:680, margin:"0 auto", padding:"20px 16px", display:"flex", flexDirection:"column", gap:14 }}>

        <Card title="LØPSMODUS">
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8, marginBottom: mode==="boost"?14:0 }}>
            {[
              ["speed4",  "🏎 Speed 4",          "Uten boost"],
              ["boost",   "⚡ Speed 4 + Boost",   "Konfigurerbar boost"],
              ["nboost",  "🏁 Speed 5",           "Uten boost"],
            ].map(([v,l,s]) => (
              <ModeBtn key={v} active={mode===v} onClick={()=>setMode(v)} label={l} sub={s} />
            ))}
          </div>

          {mode === "boost" && (
            <div style={{ background:"#0a0a0f", borderRadius:6, padding:"14px 14px 10px", border:"1px solid #2a2a3a" }}>
              <div style={{ fontSize:12, color:COL_ACCENT, letterSpacing:2, marginBottom:12 }}>⚡ BOOST-KONFIGURASJON</div>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>

                {/* Boost interval */}
                <div>
                  <label htmlFor="boost-interval" style={{ display:"block", fontSize:12, color:TXT_SECONDARY, marginBottom:6 }}>Boost hvert X minutt</label>
                  <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                    <input id="boost-interval" type="number" min={5} max={30} step={1} value={boostInterval}
                      aria-describedby="boost-interval-hint"
                      onChange={e => setBoostInterval(Math.max(5, Math.min(30, parseInt(e.target.value)||10)))}
                      style={{ ...S.input, width:72, fontSize:18, fontWeight:900, color:COL_ACCENT, textAlign:"center", padding:"6px 4px" }} />
                    <span style={{ fontSize:12, color:TXT_MUTED }} aria-hidden="true">min</span>
                  </div>
                  <div id="boost-interval-hint" style={{ fontSize:12, color:TXT_MUTED, marginTop:4 }}>
                    → {Math.floor((RACE_DURATION - 1) / boostInterval)} boosts i løpet
                  </div>
                </div>

                {/* Boost duration */}
                <div>
                  <label htmlFor="boost-duration" style={{ display:"block", fontSize:12, color:TXT_SECONDARY, marginBottom:6 }}>Boost varer i X sekunder</label>
                  <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                    <input id="boost-duration" type="number" min={15} max={180} step={5} value={Math.round(boostDuration * 60)}
                      aria-describedby="boost-duration-hint"
                      onChange={e => setBoostDuration(Math.max(15, Math.min(180, parseInt(e.target.value)||60)) / 60)}
                      style={{ ...S.input, width:72, fontSize:18, fontWeight:900, color:COL_ACCENT, textAlign:"center", padding:"6px 4px" }} />
                    <span style={{ fontSize:12, color:TXT_MUTED }} aria-hidden="true">sek</span>
                  </div>
                  <div id="boost-duration-hint" style={{ fontSize:12, color:TXT_MUTED, marginTop:4 }}>
                    = {boostDuration >= 1 ? `${boostDuration.toFixed(1)} min` : `${Math.round(boostDuration*60)} sek`}
                  </div>
                </div>
              </div>

              {/* Preview boost windows */}
              <div style={{ marginTop:12, fontSize:12, color:TXT_MUTED }}>
                Boost-vindu: {getBoostWindows("boost", boostInterval, boostDuration).slice(0,6).map(b =>
                  `${fmt(b.start)}–${fmt(b.end)}`
                ).join("  ·  ")}{getBoostWindows("boost", boostInterval, boostDuration).length > 6 ? "  …" : ""}
              </div>
            </div>
          )}
        </Card>

        <Card title="ANTALL FØRERE">
          <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
            {[3,4,5,6,7,8].map(n => <NumBtn key={n} active={numDrivers===n} onClick={()=>handleNumDrivers(n)} label={n} />)}
          </div>
        </Card>

        <Card title="KARTNUMMER">
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
            {[
              { id:"kart-a", label:"Kart A", sub:"Oddetall stint (1, 3, 5…)", val:kart1, set:setKart1 },
              { id:"kart-b", label:"Kart B", sub:"Partall stint (2, 4, 6…)",  val:kart2, set:setKart2 },
            ].map(k => (
              <div key={k.label} style={{ background:"#111", borderRadius:6, padding:"12px 14px",
                border:"1px solid #2a2a3a" }}>
                <label htmlFor={k.id} style={{ display:"block", fontSize:13, color:COL_DANGER, letterSpacing:2, marginBottom:8, fontWeight:700 }}>{k.label}</label>
                <input
                  id={k.id}
                  type="number" min={1} max={99}
                  placeholder="–"
                  aria-describedby={`${k.id}-hint`}
                  value={k.val}
                  onChange={e => {
                    const v = e.target.value;
                    if (v === "" || (parseInt(v) >= 1 && parseInt(v) <= 99)) k.set(v);
                  }}
                  style={{ ...S.input, width:"100%", fontSize:22, fontWeight:900,
                    color:COL_ACCENT, textAlign:"center", padding:"8px 4px" }}
                />
                <div id={`${k.id}-hint`} style={{ fontSize:12, color:TXT_MUTED, marginTop:6, textAlign:"center" }}>{k.sub}</div>
              </div>
            ))}
          </div>
        </Card>

        <Card title="FØRER-OPPSETT">
          {drivers.map((d, i) => {
            const nameId = `driver-name-${i}`;
            const lapId  = `driver-lap-${i}`;
            return (
            <div key={i} style={{ marginBottom:12 }}>
              <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:6 }}>
                <Dot color={COLORS[i]} label={`Fører ${i+1} farge`} />
                <label htmlFor={nameId} className="sr-only">Navn på fører {i+1}</label>
                <input id={nameId} value={d.name} onChange={e=>updateDriver(i,"name",e.target.value)} style={S.input} />
              </div>
              <div style={{ display:"flex", alignItems:"center", gap:8, paddingLeft:18 }}>
                <label htmlFor={lapId} style={{ fontSize:12, color:TXT_MUTED, minWidth:120 }}>
                  Rundetid (sek)
                </label>
                <input
                  id={lapId}
                  type="text"
                  inputMode="decimal"
                  placeholder="36,1"
                  aria-describedby={`${lapId}-hint`}
                  value={d.lapTimeStr ?? fmtLapTime(d.lapTime)}
                  onChange={e => {
                    const raw = e.target.value;
                    const parsed = parseLapTime(raw);
                    updateDriver(i, "lapTimeStr", raw);
                    if (parsed != null) updateDriver(i, "lapTime", parsed);
                  }}
                  onBlur={e => {
                    const parsed = parseLapTime(e.target.value);
                    if (parsed != null) {
                      updateDriver(i, "lapTimeStr", fmtLapTime(parsed));
                      updateDriver(i, "lapTime", parsed);
                    }
                  }}
                  style={{ ...S.input, width:80, color:COL_ACCENT, fontWeight:700,
                    letterSpacing:1, textAlign:"center" }}
                />
                <span id={`${lapId}-hint`} style={{ fontSize:12, color:TXT_MUTED }}>
                  = {(() => {
                    const t = d.lapTime;
                    const m = Math.floor(t / 60);
                    const s = (t % 60).toFixed(1).replace(".", ",");
                    return m > 0 ? `${m}m ${s}s` : `${s}s`;
                  })()} · {(d.lapTime / 60).toFixed(3)} min
                </span>
              </div>
            </div>
            );
          })}
        </Card>

        <Card title="REGLER">
          <div style={{ fontSize:11, color:TXT_MUTED, lineHeight:2 }}>
            <div>⏱ Løpslengde: <b style={{color:TXT_SECONDARY}}>120 min</b></div>
            <div>🛑 Min. pitstop: <b style={{color:TXT_SECONDARY}}>7 (= 8 stints)</b></div>
            <div>⏳ Pitstop-tid: <b style={{color:TXT_SECONDARY}}>50 sek</b></div>
            <div>🪧 Pit-skilt <b style={{color:COL_WARNING}}>90 sek før planlagt stint-slutt</b> → fører kjører én runde til</div>
            <div>⚠️ Maks stinttid: <b style={{color:COL_DANGER}}>20:00</b></div>
            {mode === "boost"
              ? <div>⚡ Boost: <b style={{color:COL_ACCENT}}>hvert {boostInterval} min, {Math.round(boostDuration*60)} sek varighet</b></div>
              : <div>🚫 Ingen boost aktivert</div>
            }
            <div>👤 Stint: <b style={{color:TXT_SECONDARY}}>7–20 min</b></div>
          </div>
        </Card>

        <button onClick={buildInitial} aria-label="Beregn strategi basert på oppgitte verdier" style={S.primaryBtn}><span aria-hidden="true">⚡ </span>BEREGN STRATEGI</button>
      </div>
    </div>
  );

  // ── RACE PAGE ────────────────────────────────────────────────────────────────
  return (
    <div style={S.page}>
      <A11yStyles />
      <a href="#main-content" className="skip-link">Hopp til hovedinnhold</a>
      <AppHeader />

      {/* Pit board alert */}
      {showPitBoard && (
        <div role="alert" aria-live="assertive" style={{ background: pitBoardUrgent ? "#c0392b" : "#a05400",
          padding:"12px 24px", textAlign:"center", fontSize:14,
          fontWeight:900, letterSpacing:2, borderBottom:"2px solid rgba(0,0,0,.3)", color:"#fff" }}>
          <span aria-hidden="true">🪧 </span>PIT-SKILT UT! — {currentStint?.driverName?.toUpperCase()} — KJØR ÉN RUNDE TIL, SÅ PIT!
          {pitBoardUrgent && <span style={{ marginLeft:16 }}><span aria-hidden="true">⚠️ </span>BUFFER-RUNDE — PIT VED NESTE INNGANG!</span>}
        </div>
      )}

      {/* Pit rule warning */}
      {warningPits && raceStarted && (
        <div role="status" aria-live="polite" style={{ background:"#1a0a00", borderBottom:"1px solid #FF4136",
          padding:"8px 24px", fontSize:13, color:COL_WARNING, letterSpacing:1, textAlign:"center" }}>
          <span aria-hidden="true">⚠️ </span>Strategien har kun {totalPitsPlanned} pitstop — regelkrav er minimum {MIN_TOTAL_PITS}. Sjekk strategi!
        </div>
      )}

      {/* Race clock bar */}
      <div style={{ background:"#0d0d14", borderBottom:"1px solid #1a1a2e",
        padding:"10px 20px", display:"flex", alignItems:"center", gap:20, flexWrap:"wrap" }}>
        <ClockBlock label="LØPSTID"   value={fmt(raceElapsed)} color={raceElapsed>110?COL_DANGER:COL_ACCENT} />
        <ClockBlock label="GJENSTÅR"  value={fmt(Math.max(0,RACE_DURATION-raceElapsed))} color=COL_SUCCESS />
        {currentStint && (
          <ClockBlock label="TID I STINT" value={fmt(timeInStint)}
            color={showPitBoard?COL_DANGER:pitBoardThreshold!=null&&timeInStint>=(pitBoardThreshold-currentStintStart-0.5)?COL_WARNING:TXT_PRIMARY} />
        )}
        <div style={{ fontSize:12, color:TXT_MUTED }}>
          Pit: <b style={{color: pitsDone<MIN_TOTAL_PITS?COL_WARNING:COL_SUCCESS}}>{pitsDone}</b>/{MIN_TOTAL_PITS} min
        </div>
        <div style={{ marginLeft:"auto", display:"flex", gap:8 }}>
          {!raceStarted
            ? <button onClick={startRace} aria-label="Start løpsklokken" style={S.startBtn}><span aria-hidden="true">▶ </span>START LØP</button>
            : <span role="status" style={{ fontSize:12, color:COL_SUCCESS, letterSpacing:2, alignSelf:"center" }}><span aria-hidden="true">● </span>LØPET PÅGÅR</span>
          }
          <button onClick={()=>setPage("setup")} aria-label="Gå tilbake til oppsett-siden" style={S.backBtn}><span aria-hidden="true">← </span>OPPSETT</button>
        </div>
      </div>

      <div style={{ maxWidth:1300, margin:"0 auto", padding:14 }}>
        {/* Tabs */}
        <div role="tablist" aria-label="Strategi-visninger" style={{ display:"flex", gap:2, borderBottom:"2px solid #1a1a2e", marginBottom:14 }}>
          {[["live","🔴 LIVE"],["strategy","📋 STRATEGI"],["timeline","⏱ TIDSLINJE"],
            ["summary","📊 OVERSIKT"],["log","📝 JUSTERINGER"]].map(([id,label]) => (
            <TabBtn key={id} id={`tab-${id}`} active={activeTab===id} onClick={()=>setActiveTab(id)} label={label} />
          ))}
        </div>

        {/* ─── LIVE TAB ─────────────────────────────────────────────────────── */}
        {activeTab === "live" && (
          <div role="tabpanel" aria-labelledby="tab-live" style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:14 }}>

            {/* Current stint */}
            <div style={{ background:"#111", borderRadius:8, padding:18,
              border:`2px solid ${currentStint ? COLORS[currentStint.driver] : "#1a1a2e"}`,
              display:"flex", flexDirection:"column", gap:0 }}>
              <div style={{ fontSize:12, letterSpacing:3, color:COL_DANGER, marginBottom:10 }}>
                NÅVÆRENDE STINT #{currentStintIdx+1}
              </div>
              {currentStint ? <>
                <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:14 }}>
                  <Dot color={COLORS[currentStint.driver]} size={14} />
                  <span style={{ fontSize:18, fontWeight:900 }}>{currentStint.driverName}</span>
                  {currentStint.kartNum && (
                    <span style={{ marginLeft:"auto", background:"#2a0a4e",
                      border:`2px solid ${currentStint.stint%2===1?"#DA77F2":COL_SUCCESS}`,
                      color: currentStint.stint%2===1?"#DA77F2":COL_SUCCESS,
                      borderRadius:6, padding:"4px 14px", fontSize:18, fontWeight:900,
                      letterSpacing:2 }}>
                      🏎 #{currentStint.kartNum}
                    </span>
                  )}
                </div>
                <Row label="Planlagt varighet"  value={fmt(currentStint.duration)}          color=COL_ACCENT />
                <Row label="🪧 Pit-skilt ved"   value={fmt(currentStint.pitBoardAt)}        color=COL_WARNING />
                <Row label="Planlagt pit inn"   value={currentStint.pitEntry?fmt(currentStint.pitEntry):"Siste"} color=COL_DANGER />
                <Row label="Planlagt pit ut"    value={currentStint.pitExit?fmt(currentStint.pitExit):"—"}      color=COL_SUCCESS />
                <Row label="Est. runder"        value={currentStint.estimatedLaps} />

                {/* Progress bar */}
                {raceStarted && (
                  <div style={{ marginTop:14 }}>
                    <div style={{ fontSize:12, color:TXT_MUTED, letterSpacing:2, marginBottom:4 }}>STINT FREMGANG</div>
                    <div style={{ background:"#0a0a0f", borderRadius:4, height:12, overflow:"hidden", position:"relative" }}>
                      <div style={{
                        height:"100%",
                        width:`${Math.min(100,(timeInStint/MAX_STINT)*100)}%`,
                        background: showPitBoard?COL_DANGER:timeInStint>=(currentStint.duration-PIT_BOARD_BEFORE-0.5)?COL_WARNING:COLORS[currentStint.driver],
                        transition:"width .5s", borderRadius:4,
                      }} />
                      {/* Pit board marker at 90s before planned end */}
                      {currentStint.pitBoardAt != null && (
                        <div style={{ position:"absolute",
                          left:`${((currentStint.pitBoardAt - currentStintStart)/MAX_STINT)*100}%`,
                          top:0, bottom:0, width:2, background:COL_WARNING, opacity:.9 }} />
                      )}
                    </div>
                    <div style={{ display:"flex", justifyContent:"space-between", fontSize:11, color:TXT_DISABLED, marginTop:2 }}>
                      <span>0:00</span>
                      <span style={{color:COL_WARNING}}><span aria-hidden="true">🪧 </span>Pit-skilt {fmt(currentStint.duration - PIT_BOARD_BEFORE)} (−90s)</span>
                      <span style={{color:COL_DANGER}}>MAX {fmt(MAX_STINT)}</span>
                    </div>
                  </div>
                )}

                {/* Pit registration */}
                {raceStarted && (
                  <div style={{ marginTop:14, padding:12, background:"#0d0d14", borderRadius:6, border:"1px solid #2a2a3a" }}>
                    <div style={{ fontSize:12, color:COL_WARNING, letterSpacing:2, marginBottom:4 }}>
                      📝 REGISTRER NÅR NESTE FØRER KJØRER UT AV PIT
                    </div>
                    <div style={{ fontSize:12, color:TXT_MUTED, marginBottom:10, lineHeight:1.6 }}>
                      Skriv inn løpstid (MM:SS) når neste fører kjører ut.
                      Strategien reberegnes automatisk basert på faktisk timing.
                    </div>

                    {/* Adaptive impact preview */}
                    {(() => {
                      const planned = currentStint.pitEntry;
                      if (!planned) return null;
                      const t = parseManualTime(manualTime) !== null
                        ? (parseManualTime(manualTime) + PIT_DURATION_MIN)
                        : raceElapsed;
                      const delta = t - (planned + PIT_DURATION_MIN);
                      const early = delta < -0.5;
                      const late  = delta >  0.5;
                      if (!early && !late) return null;
                      return (
                        <div style={{ marginBottom:10, padding:"8px 10px", borderRadius:4,
                          background: early?"#0a1a0a":"#1a0a00",
                          border:`1px solid ${early?COL_SUCCESS:COL_WARNING}`,
                          fontSize:12, color: early?COL_SUCCESS:COL_WARNING }}>
                          {early
                            ? `⬆ Tidlig pit (~${fmt(Math.abs(delta))} tidlig) → gjenværende stints får mer tid`
                            : `⬇ Sen pit (~${fmt(delta)} sent) → gjenværende stints får kortere tid`
                          }
                          {late && Math.abs(delta) > 2
                            ? " — kan utløse ekstra pitstop" : ""}
                        </div>
                      );
                    })()}

                    <div style={{ display:"flex", gap:6, flexWrap:"wrap", alignItems:"center" }}>
                      <label htmlFor="manual-time" className="sr-only">Manuell pit-tid (MM:SS)</label>
                      <input id="manual-time" type="text" inputMode="numeric"
                        placeholder={fmt(raceElapsed)} value={manualTime}
                        aria-label="Manuell tid for når neste fører kjører ut, format MM:SS"
                        onChange={e=>setManualTime(e.target.value)}
                        style={{ width:80, background:"#111", border:"1px solid #2a2a3a",
                          color:COL_ACCENT, padding:"8px 10px", borderRadius:4,
                          fontSize:14, fontFamily:"inherit" }} />
                      <button onClick={()=>{
                        const t = parseManualTime(manualTime);
                        const exitMin = t != null ? t : raceElapsed;
                        recordPitExit(exitMin, manualTime ? `Manuell: ${manualTime}` : "");
                      }} aria-label="Bekreft at fører er ute med oppgitt tid" style={S.confirmBtn}>
                        <span aria-hidden="true">✓ </span>FØRER UTE
                      </button>
                      <button onClick={()=>recordPitExit(raceElapsed, "Nå-knapp")}
                        aria-label={`Bekreft at fører er ute akkurat nå, klokken ${fmt(raceElapsed)}`}
                        style={S.nowBtn}>
                        <span aria-hidden="true">⏱ </span>NÅ ({fmt(raceElapsed)})
                      </button>
                    </div>
                  </div>
                )}
              </> : (
                <div style={{ color:TXT_MUTED, fontSize:14, marginTop:20, textAlign:"center" }}>
                  Løpet er fullført! 🏁<br/>
                  <span style={{fontSize:11}}>Pitstop gjennomført: {pitsDone} / min {MIN_TOTAL_PITS}</span>
                </div>
              )}
            </div>

            {/* Next stint */}
            <div style={{ background:"#111", borderRadius:8, padding:18,
              border:`1px solid ${nextStint?COLORS[nextStint.driver]+"55":"#1a1a2e"}`,
              display:"flex", flexDirection:"column" }}>
              <div style={{ fontSize:12, letterSpacing:3, color:TXT_MUTED, marginBottom:10 }}>
                NESTE STINT #{currentStintIdx+2}
              </div>
              {nextStint ? <>
                <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:14 }}>
                  <Dot color={COLORS[nextStint.driver]} size={12} />
                  <span style={{ fontSize:16, fontWeight:700, color:TXT_SECONDARY }}>{nextStint.driverName}</span>
                  {nextStint.kartNum && (
                    <span style={{ marginLeft:"auto", background:"#2a0a4e",
                      border:`1px solid ${nextStint.stint%2===1?"#DA77F2":COL_SUCCESS}`,
                      color: nextStint.stint%2===1?"#DA77F2":COL_SUCCESS,
                      borderRadius:6, padding:"3px 10px", fontSize:14, fontWeight:900 }}>
                      🏎 #{nextStint.kartNum}
                    </span>
                  )}
                  <span style={{ marginLeft: nextStint.kartNum ? 0 : "auto", fontSize:12,
                    background:"#1a1a2e", color:TXT_MUTED, padding:"2px 8px", borderRadius:10 }}>GJØR KLAR</span>
                </div>
                <Row label="Planlagt start"    value={fmt(nextStint.startTime)} />
                <Row label="Planlagt varighet" value={fmt(nextStint.duration)} color=COL_ACCENT />
                <Row label="🪧 Pit-skilt ved"  value={fmt(nextStint.pitBoardAt)} color=COL_WARNING />
                <Row label="Planlagt pit inn"  value={nextStint.pitEntry?fmt(nextStint.pitEntry):"Siste"} />
                <Row label="Est. runder"       value={nextStint.estimatedLaps} />
                {nextStint.inBoostConflict && (
                  <div style={{ marginTop:8, fontSize:12, color:COL_DANGER }}>
                    ⚡ Advarsel: Mulig boost-konflikt ved pit-inn
                  </div>
                )}
              </> : <div style={{ color:TXT_MUTED, fontSize:13, marginTop:20 }}>Siste stint pågår</div>}

              {/* Upcoming stints preview */}
              {schedule.slice(currentStintIdx+2, currentStintIdx+5).length > 0 && (
                <div style={{ marginTop:"auto", paddingTop:14, borderTop:"1px solid #1a1a2e" }}>
                  <div style={{ fontSize:12, color:TXT_DISABLED, letterSpacing:2, marginBottom:8 }}>KOMMENDE STINTS</div>
                  {schedule.slice(currentStintIdx+2, currentStintIdx+5).map((s,i) => (
                    <div key={i} style={{ display:"flex", alignItems:"center", gap:8,
                      marginBottom:6, opacity:.7 }}>
                      <Dot color={COLORS[s.driver]} size={6} />
                      <span style={{ fontSize:12, color:TXT_SECONDARY, flex:1 }}>#{s.stint} {s.driverName}</span>
                      <span style={{ fontSize:12, color:TXT_MUTED }}>{fmt(s.startTime)}</span>
                      <span style={{ fontSize:12, color:COL_ACCENT }}>{fmt(s.duration)}</span>
                    </div>
                  ))}
                </div>
              )}
            </div>

            {/* Boost status */}
            {mode === "boost" && raceStarted && (
              <div style={{ gridColumn:"1/-1", background:"#111", borderRadius:8,
                padding:12, border:"1px solid #1a1a2e",
                display:"flex", gap:10, flexWrap:"wrap", alignItems:"center" }}>
                <div style={{ fontSize:12, letterSpacing:3, color:COL_ACCENT }}>⚡ BOOST STATUS</div>
                {bw.filter(b => b.end > raceElapsed).slice(0,6).map((b,i) => {
                  const active = b.start <= raceElapsed && b.end > raceElapsed;
                  return (
                    <div key={i} style={{ background:active?"#3a2a00":"#0a0a0f",
                      border:`1px solid ${active?COL_ACCENT:"#1a1a2e"}`,
                      borderRadius:6, padding:"6px 12px", textAlign:"center", minWidth:60 }}>
                      {active
                        ? <div style={{ fontSize:11, fontWeight:900, color:COL_ACCENT }}>🔥 AKTIV!</div>
                        : <>
                          <div style={{ fontSize:12, fontWeight:900, color:COL_ACCENT }}>{fmt(b.start)}</div>
                          <div style={{ fontSize:11, color:TXT_MUTED }}>om {fmt(b.start - raceElapsed)}</div>
                        </>
                      }
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}

        {/* ─── STRATEGY TAB ─────────────────────────────────────────────────── */}
        {activeTab === "strategy" && (
          <div role="tabpanel" aria-labelledby="tab-strategy">
            <div className="table-wrap" style={{ background:"#111", borderRadius:8, overflow:"hidden", border:"1px solid #1a1a2e" }}>
              <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12 }}>
                <caption className="sr-only">Strategi-oversikt for løpet med stints, kart, førere og pit-tider</caption>
                <thead>
                  <tr style={{ background:"#1a1a2e", borderBottom:"2px solid #FF4136" }}>
                    {["#","KART","FØRER","START","VARIGHET","FAKTISK","🪧 PIT-SKILT","PIT INN","PIT UT","RND EST.","RND FAKTISK","STATUS"].map(h => (
                      <th key={h} scope="col" style={{ padding:"10px 7px", textAlign:"left",
                        color:COL_DANGER, fontWeight:900, fontSize:12, letterSpacing:1 }}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {schedule.map((s, i) => {
                    const isCurrent = i === currentStintIdx && raceStarted;
                    const isDone    = s.isCompleted;
                    return (
                      <tr key={i}
                        aria-current={isCurrent ? "step" : undefined}
                        style={{
                        borderBottom:"1px solid #1a1a2e",
                        background: isCurrent?"#2a1a00":isDone?"#0a200a":
                          s.inBoostConflict?"rgba(255,107,107,.08)":i%2===0?"#0d0d14":"#111",
                        opacity: isDone ? 0.75 : 1,
                      }}>
                        <td style={{ padding:"8px 7px", fontWeight:700,
                          color:isCurrent?COL_ACCENT:COL_DANGER }}>
                          <span aria-hidden="true">{isCurrent?"▶":isDone?"✓":""}</span> {s.stint}
                        </td>
                        <td style={{ padding:"8px 7px" }}>
                          {s.kartNum ? (
                            <span aria-label={`Kart ${s.stint%2===1?"A":"B"} nummer ${s.kartNum}`}
                              style={{ background: s.stint%2===1?"#2a0a4e":"#0a2a1a",
                              border:`2px solid ${s.stint%2===1?"#DA77F2":COL_SUCCESS}`,
                              color: s.stint%2===1?"#DA77F2":COL_SUCCESS,
                              borderRadius: s.stint%2===1?4:12, padding:"2px 8px", fontSize:12, fontWeight:900,
                              letterSpacing:1, display:"inline-block", minWidth:48, textAlign:"center" }}>
                              {s.stint%2===1?"A":"B"}·{s.kartNum}
                            </span>
                          ) : <span style={{color:TXT_DISABLED}} aria-label="Ingen kart">—</span>}
                        </td>
                        <td style={{ padding:"8px 7px" }}>
                          <span style={{ display:"flex", alignItems:"center", gap:5 }}>
                            <Dot color={COLORS[s.driver]} size={6} />{s.driverName}
                          </span>
                        </td>
                        <td style={{ padding:"8px 7px", color:TXT_SECONDARY }}>{fmt(s.startTime)}</td>
                        <td style={{ padding:"8px 7px", color:COL_ACCENT, fontWeight:700 }}>{fmt(s.duration)}</td>
                        <td style={{ padding:"8px 7px", color:isDone?COL_SUCCESS:TXT_DISABLED }}>
                          {isDone ? fmt(s.actualDuration) : "—"}
                        </td>
                        <td style={{ padding:"8px 7px", color:COL_WARNING }}>
                          {s.pitBoardAt?fmt(s.pitBoardAt):"—"}
                        </td>
                        <td style={{ padding:"8px 7px", color:s.pitEntry?COL_DANGER:TXT_DISABLED }}>
                          {s.pitEntry?fmt(s.pitEntry):"—"}
                        </td>
                        <td style={{ padding:"8px 7px", color:s.pitExit?COL_SUCCESS:TXT_DISABLED }}>
                          {s.pitExit?fmt(s.pitExit):"—"}
                        </td>
                        <td style={{ padding:"8px 7px", color:COL_INFO, fontWeight:700 }}>
                          {s.estimatedLaps}
                        </td>
                        <td style={{ padding:"4px 7px" }}>
                          <input
                            type="number" min={0} max={99}
                            value={actualLaps[s.stint] ?? ""}
                            placeholder={String(s.estimatedLaps)}
                            aria-label={`Faktiske runder kjørt i stint ${s.stint} (estimat: ${s.estimatedLaps})`}
                            onChange={e => {
                              const v = e.target.value;
                              setActualLaps(prev => {
                                const next = { ...prev };
                                if (v === "" || v === null) { delete next[s.stint]; }
                                else { next[s.stint] = parseInt(v) || 0; }
                                return next;
                              });
                            }}
                            style={{
                              width:60, background: actualLaps[s.stint] != null ? "#1a1a00" : "#0d0d14",
                              border:`1px solid ${actualLaps[s.stint] != null ? COL_ACCENT : "#2a2a3a"}`,
                              color:COL_ACCENT, padding:"6px 6px", borderRadius:4,
                              fontSize:13, fontWeight:700, fontFamily:"inherit", textAlign:"center",
                            }}
                          />
                        </td>
                        <td style={{ padding:"8px 7px" }}>
                          {isDone    && <span style={{color:COL_SUCCESS,fontSize:12,fontWeight:700}}><span aria-hidden="true">✓ </span>FERDIG</span>}
                          {isCurrent && <span style={{color:COL_ACCENT,fontSize:12,fontWeight:700}}><span aria-hidden="true">▶ </span>PÅGÅR</span>}
                          {!isDone&&!isCurrent&&s.inBoostConflict&&<span style={{color:COL_DANGER,fontSize:12,fontWeight:700}}><span aria-hidden="true">⚡ </span>BOOST-KONFLIKT</span>}
                          {!isDone&&!isCurrent&&!s.inBoostConflict&&<span style={{color:TXT_SECONDARY,fontSize:12,fontWeight:700}}>VENTER</span>}
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
            <div style={{ marginTop:8, fontSize:12, color:TXT_MUTED, display:"flex", gap:16, flexWrap:"wrap", alignItems:"center" }}>
              <span><span aria-hidden="true">🛑 </span>Planlagte pitstop: <b style={{color: warningPits?COL_DANGER:COL_WARNING}}>{totalPitsPlanned}</b>
                {warningPits && <span role="alert" style={{color:COL_DANGER}}><span aria-hidden="true"> ⚠️ </span>Under minimum!</span>}
              </span>
              <span><span aria-hidden="true">✓ </span>Gjennomført: <b style={{color:COL_SUCCESS}}>{pitsDone}</b></span>
              <span><span aria-hidden="true">⏱ </span>Tid i pit: <b style={{color:TXT_SECONDARY}}>{fmt(pitsDone*PIT_DURATION_MIN)}</b></span>
              <span style={{ marginLeft:"auto", display:"flex", gap:12, alignItems:"center" }}>
                <span>🔵 Est. runder: <b style={{color:COL_INFO}}>{totalEstLaps}</b></span>
                {hasLapOverride && (
                  <span style={{ background:"#1a1a00", border:"1px solid #FFDC00",
                    borderRadius:6, padding:"3px 10px", color:COL_ACCENT, fontWeight:700 }}>
                    ✏️ Justert total: <b>{totalEffLaps}</b> runder
                    {totalEffLaps !== totalEstLaps && (
                      <span style={{ marginLeft:6, color: totalEffLaps > totalEstLaps ? COL_SUCCESS : COL_DANGER }}>
                        ({totalEffLaps > totalEstLaps ? "+" : ""}{totalEffLaps - totalEstLaps})
                      </span>
                    )}
                  </span>
                )}
                {hasLapOverride && (
                  <button onClick={() => setActualLaps({})}
                    aria-label="Nullstill alle manuelt registrerte runder"
                    style={{ background:"transparent", border:`1px solid ${TXT_MUTED}`, color:TXT_PRIMARY,
                      padding:"6px 10px", borderRadius:4, cursor:"pointer",
                      fontFamily:"inherit", fontSize:12, minHeight:32 }}>
                    <span aria-hidden="true">↺ </span>Nullstill
                  </button>
                )}
              </span>
            </div>
          </div>
        )}

        {/* ─── TIMELINE TAB ─────────────────────────────────────────────────── */}
        {activeTab === "timeline" && (
          <div role="tabpanel" aria-labelledby="tab-timeline" style={{ display:"flex", flexDirection:"column", gap:12 }}>
            <div style={{ background:"#111", borderRadius:8, padding:18, border:"1px solid #1a1a2e" }}>
              <div style={{ fontSize:12, letterSpacing:3, color:COL_DANGER, marginBottom:12 }}>LØPSOVERSIKT</div>
              <div style={{ position:"relative", height:60, background:"#0a0a0f", borderRadius:6, overflow:"hidden", marginBottom:8 }}>
                {bw.map((b,i) => (
                  <div key={i} style={{ position:"absolute", left:`${(b.start/120)*100}%`,
                    width:`${(boostDuration/120)*100}%`, top:0, bottom:0,
                    background:"rgba(255,220,0,.1)", borderLeft:"1px solid rgba(255,220,0,.35)" }} />
                ))}
                {schedule.map((s,i) => {
                  const l=(s.startTime/120)*100, w=(s.duration/120)*100;
                  return (
                    <div key={i} style={{ position:"absolute", left:`${l}%`,
                      width:`${Math.max(w,.4)}%`, top:8, bottom:8,
                      background:COLORS[s.driver], opacity:s.isCompleted?.55:.85,
                      borderRadius:3, display:"flex", alignItems:"center", justifyContent:"center",
                      fontSize:11, color:"#000", fontWeight:900, overflow:"hidden",
                      outline: i===currentStintIdx&&raceStarted?"2px solid #fff":"none",
                    }}>
                      {w>2?`#${s.stint}`:""}
                    </div>
                  );
                })}
                {raceStarted && (
                  <div style={{ position:"absolute", left:`${(raceElapsed/120)*100}%`,
                    top:0, bottom:0, width:2, background:"#fff", opacity:.7 }} />
                )}
              </div>
              <div style={{ display:"flex", flexWrap:"wrap", gap:10 }}>
                {drivers.map((d,i)=>(
                  <span key={i} style={{ display:"flex", alignItems:"center", gap:5, fontSize:12, color:TXT_SECONDARY }}>
                    <div style={{ width:12,height:7,background:COLORS[i],borderRadius:2 }} />{d.name}
                  </span>
                ))}
                {mode==="boost" && (
                  <span style={{ display:"flex", alignItems:"center", gap:5, fontSize:12, color:TXT_SECONDARY }}>
                    <div style={{ width:12,height:7,background:"rgba(255,220,0,.3)",
                      border:"1px solid #FFDC00",borderRadius:2 }} />Boost
                  </span>
                )}
              </div>
              <div style={{ position:"relative", height:14, marginTop:4 }}>
                {[0,15,30,45,60,75,90,105,120].map(t=>(
                  <div key={t} style={{ position:"absolute", left:`${(t/120)*100}%`,
                    fontSize:11, color:TXT_DISABLED, transform:"translateX(-50%)" }}>{t}'</div>
                ))}
              </div>
            </div>

            <div style={{ background:"#111", borderRadius:8, padding:18, border:"1px solid #1a1a2e" }}>
              <div style={{ fontSize:12, letterSpacing:3, color:COL_DANGER, marginBottom:14 }}>FØRER-TIDSLINJE</div>
              {drivers.map((d,di)=>{
                const ds=schedule.filter(s=>s.driver===di);
                return (
                  <div key={di} style={{ marginBottom:12 }}>
                    <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:4 }}>
                      <Dot color={COLORS[di]} size={7} />
                      <span style={{ fontSize:12,color:TXT_SECONDARY,minWidth:80 }}>{d.name}</span>
                      <span style={{ fontSize:12,color:TXT_MUTED }}>
                        {ds.reduce((sum,s)=>sum+(s.actualDuration??s.duration),0).toFixed(1)} min · {ds.length} stint(s)
                      </span>
                    </div>
                    <div style={{ position:"relative", height:22, background:"#0a0a0f", borderRadius:4, overflow:"hidden" }}>
                      {ds.map((s,si)=>(
                        <div key={si} style={{ position:"absolute",
                          left:`${(s.startTime/120)*100}%`, width:`${(s.duration/120)*100}%`,
                          top:2, bottom:2, background:COLORS[di], opacity:s.isCompleted?.5:.8,
                          borderRadius:3, display:"flex", alignItems:"center", justifyContent:"center",
                          fontSize:11, fontWeight:700, color:"#000" }}>
                          {(s.duration/120*100)>3?fmt(s.duration):""}
                        </div>
                      ))}
                      {raceStarted && (
                        <div style={{ position:"absolute",left:`${(raceElapsed/120)*100}%`,
                          top:0,bottom:0,width:1,background:"#fff",opacity:.4 }} />
                      )}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* ─── SUMMARY TAB ──────────────────────────────────────────────────── */}
        {activeTab === "summary" && (
          <div role="tabpanel" aria-labelledby="tab-summary" style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
            {driverSummary.map((ds,i)=>(
              <div key={i} style={{ background:"#111", borderRadius:8, padding:18,
                border:`2px solid ${COLORS[i]}22`, borderLeft:`4px solid ${COLORS[i]}` }}>
                <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:14 }}>
                  <Dot color={COLORS[i]} size={12} />
                  <span style={{ fontWeight:700, fontSize:14 }}>{ds.name}</span>
                  <span style={{ marginLeft:"auto", fontSize:12, color:TXT_MUTED }}>
                    {ds.done}/{ds.stints} stints ferdig
                  </span>
                </div>
                <Row label="Total kjøretid"  value={fmt(ds.totalTime)}        color=COL_ACCENT />
                <Row label="Antall stints"   value={`${ds.stints} stint(s)`}  color=COL_SUCCESS />
                <Row label="Est. runder"     value={`${ds.totalLaps} runder`} color={hasLapOverride?COL_ACCENT:COL_INFO} />
                <Row label="Avg per stint"   value={fmt(ds.totalTime/Math.max(1,ds.stints))} color=COL_WARNING />
              </div>
            ))}
            <div style={{ gridColumn:"1/-1", background:"#111", borderRadius:8, padding:18, border:"1px solid #1a1a2e" }}>
              <div style={{ fontSize:12, letterSpacing:3, color:COL_DANGER, marginBottom:14 }}>LØPSOVERSIKT</div>
              <div style={{ display:"grid", gridTemplateColumns:"repeat(5,1fr)", gap:14 }}>
                <BigStat label="Plan. pitstop"  value={totalPitsPlanned} color={warningPits?COL_DANGER:COL_DANGER} />
                <BigStat label="Gjenn. pitstop" value={pitsDone} color=COL_SUCCESS />
                <BigStat label="Stints"         value={schedule.length} />
                <BigStat label="Tid i pit"      value={fmt(pitsDone*PIT_DURATION_MIN)} />
                <div style={{ textAlign:"center" }}>
                  <div style={{ fontSize:22, fontWeight:900, color: hasLapOverride?COL_ACCENT:COL_INFO, lineHeight:1 }}>
                    {totalEffLaps}
                  </div>
                  <div style={{ fontSize:11, color:TXT_MUTED, marginTop:4, letterSpacing:1 }}>
                    {hasLapOverride ? "JUSTERTE RUNDER" : "EST. RUNDER"}
                  </div>
                  {hasLapOverride && totalEffLaps !== totalEstLaps && (
                    <div style={{ fontSize:12, color: totalEffLaps > totalEstLaps ? COL_SUCCESS : COL_DANGER, marginTop:2 }}>
                      est. {totalEstLaps} ({totalEffLaps > totalEstLaps ? "+" : ""}{totalEffLaps - totalEstLaps})
                    </div>
                  )}
                </div>
              </div>
            </div>
          </div>
        )}

        {/* ─── LOG TAB ──────────────────────────────────────────────────────── */}
        {activeTab === "log" && (
          <div role="tabpanel" aria-labelledby="tab-log">
            {adjustLog.length === 0 ? (
              <div style={{ background:"#111", borderRadius:8, padding:32, textAlign:"center",
                color:TXT_DISABLED, border:"1px solid #1a1a2e" }}>
                <div style={{ fontSize:32, marginBottom:8 }}>📝</div>
                <div style={{ fontSize:12, letterSpacing:2 }}>Ingen justeringer registrert ennå</div>
                <div style={{ fontSize:12, color:"#2a2a3a", marginTop:6 }}>
                  Logg oppdateres automatisk når du registrerer faktisk pit-tid
                </div>
              </div>
            ) : (
              <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
                {adjustLog.map((entry, i) => {
                  const early = entry.delta != null && entry.delta < -0.5;
                  const late  = entry.delta != null && entry.delta >  0.5;
                  return (
                    <div key={i} style={{ background:"#111", borderRadius:8, padding:16,
                      border:`1px solid ${early?COL_SUCCESS:late?COL_WARNING:"#1a1a2e"}`,
                      borderLeft:`4px solid ${early?COL_SUCCESS:late?COL_WARNING:TXT_MUTED}` }}>
                      <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:10 }}>
                        <span style={{ fontSize:12, color:COL_DANGER, fontWeight:900 }}>STINT #{entry.stint}</span>
                        <span style={{ fontSize:12, fontWeight:700 }}>{entry.driver}</span>
                        <span style={{ marginLeft:"auto", fontSize:12, color:TXT_MUTED }}>@ {entry.timestamp}</span>
                      </div>
                      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:10 }}>
                        <div style={{ textAlign:"center", background:"#0d0d14", borderRadius:6, padding:"8px 6px" }}>
                          <div style={{ fontSize:11, color:TXT_MUTED, letterSpacing:2, marginBottom:4 }}>PLANLAGT PIT INN</div>
                          <div style={{ fontSize:14, fontWeight:700, color:TXT_SECONDARY }}>{fmt(entry.planned)}</div>
                        </div>
                        <div style={{ textAlign:"center", background:"#0d0d14", borderRadius:6, padding:"8px 6px" }}>
                          <div style={{ fontSize:11, color:TXT_MUTED, letterSpacing:2, marginBottom:4 }}>FAKTISK PIT INN</div>
                          <div style={{ fontSize:14, fontWeight:700, color:TXT_PRIMARY }}>{fmt(entry.actual)}</div>
                        </div>
                        <div style={{ textAlign:"center", background:"#0d0d14", borderRadius:6, padding:"8px 6px" }}>
                          <div style={{ fontSize:11, color:TXT_MUTED, letterSpacing:2, marginBottom:4 }}>AVVIK</div>
                          <div style={{ fontSize:14, fontWeight:700,
                            color: early?COL_SUCCESS:late?COL_WARNING:TXT_PRIMARY }}>
                            {entry.delta!=null?(early?"-":late?"+":"")+fmt(Math.abs(entry.delta)):"—"}
                          </div>
                        </div>
                      </div>
                      {entry.extraPits > 0 && (
                        <div style={{ marginTop:8, fontSize:12, color:COL_WARNING,
                          background:"#1a1000", borderRadius:4, padding:"6px 10px" }}>
                          ⚠️ Strategi fikk {entry.extraPits} ekstra pitstop for å holde seg innenfor regelkrav og tidsgrenser
                        </div>
                      )}
                      {early && (
                        <div style={{ marginTop:8, fontSize:12, color:COL_SUCCESS,
                          background:"#0a1a0a", borderRadius:4, padding:"6px 10px" }}>
                          ✓ Tidlig pit — gjenværende stints har fått fordelt ekstra tid
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

// ─── Shared styles ────────────────────────────────────────────────────────────
const S = {
  page: { minHeight:"100vh", background:"#0a0a0f", color:TXT_PRIMARY, fontFamily:"'Courier New',monospace" },
  input: { flex:1, background:"#111", border:"1px solid #2a2a3a", color:TXT_PRIMARY,
    padding:"8px 10px", borderRadius:4, fontSize:14, fontFamily:"'Courier New',monospace", minHeight:36 },
  primaryBtn: { background:"linear-gradient(135deg,#FF6B6B,#cc2a21)", border:"none",
    color:"#fff", padding:"16px 20px", borderRadius:8, cursor:"pointer", fontFamily:"'Courier New',monospace",
    fontSize:14, fontWeight:900, letterSpacing:3, textTransform:"uppercase",
    boxShadow:"0 4px 20px rgba(255,107,107,.4)", minHeight:52 },
  startBtn: { background:COL_SUCCESS, border:"none", color:"#000", padding:"12px 20px",
    borderRadius:6, cursor:"pointer", fontFamily:"'Courier New',monospace",
    fontSize:13, fontWeight:900, letterSpacing:2, minHeight:44 },
  backBtn: { background:"#111", border:`1px solid ${TXT_MUTED}`, color:TXT_PRIMARY,
    padding:"12px 16px", borderRadius:6, cursor:"pointer",
    fontFamily:"'Courier New',monospace", fontSize:12, letterSpacing:2, minHeight:44 },
  confirmBtn: { background:COL_SUCCESS, border:"none", color:"#000", padding:"10px 14px",
    borderRadius:4, cursor:"pointer", fontFamily:"'Courier New',monospace",
    fontSize:13, fontWeight:900, minHeight:40 },
  nowBtn: { background:COL_INFO, border:"none", color:"#000", padding:"10px 14px",
    borderRadius:4, cursor:"pointer", fontFamily:"'Courier New',monospace",
    fontSize:13, fontWeight:900, minHeight:40 },
};

// ─── Mini-components ──────────────────────────────────────────────────────────
function AppHeader() {
  return (
    <div style={{ background:"linear-gradient(135deg,#1a0a2e,#0d1117 50%,#0a1a0a)",
      borderBottom:"2px solid #FF4136", padding:"14px 22px",
      display:"flex", alignItems:"center", gap:14 }}>
      <span aria-hidden="true" style={{ fontSize:26 }}>🏁</span>
      <div>
        <div style={{ fontSize:17, fontWeight:900, letterSpacing:4, color:"#fff" }}>GOKART STRATEGI</div>
        <div style={{ fontSize:11, letterSpacing:3, color:COL_DANGER, marginTop:2 }}>BEDRIFTSSERIEN · RACE STRATEGY TOOL</div>
      </div>
    </div>
  );
}
function Card({ title, children }) {
  return (
    <div style={{ background:"#0d0d14", borderRadius:8, padding:14, border:"1px solid #1a1a2e" }}>
      <div style={{ fontSize:12, letterSpacing:3, color:COL_DANGER, marginBottom:12, fontWeight:900 }}>{title}</div>
      {children}
    </div>
  );
}
function ModeBtn({ active, onClick, label, sub }) {
  return (
    <button onClick={onClick} aria-pressed={active} style={{ background:active?COL_DANGER:"#111",
      border:`2px solid ${active?COL_DANGER:"#2a2a3a"}`, color:active?"#000":TXT_PRIMARY,
      borderRadius:6, padding:"11px 8px", cursor:"pointer", textAlign:"center", minHeight:44 }}>
      <div style={{ fontSize:13, fontWeight:700, fontFamily:"'Courier New',monospace" }}>{label}</div>
      <div style={{ fontSize:12, color:active?"#1a0000":TXT_MUTED, marginTop:3 }}>{sub}</div>
    </button>
  );
}
function NumBtn({ active, onClick, label }) {
  return (
    <button onClick={onClick} aria-pressed={active} aria-label={`${label} førere`} style={{ width:44, height:44,
      background:active?COL_DANGER:"#111", border:`2px solid ${active?COL_DANGER:"#2a2a3a"}`,
      color:active?"#000":TXT_PRIMARY, borderRadius:6, cursor:"pointer",
      fontWeight:700, fontSize:14, fontFamily:"'Courier New',monospace" }}>
      {label}
    </button>
  );
}
function TabBtn({ id, active, onClick, label }) {
  return (
    <button id={id} onClick={onClick} role="tab" aria-selected={active} style={{ background:active?"#1a1a2e":"transparent",
      border:"none", borderBottom:`2px solid ${active?COL_DANGER:"transparent"}`,
      color:active?"#fff":TXT_SECONDARY, padding:"12px 14px", cursor:"pointer",
      fontSize:12, letterSpacing:2, fontFamily:"'Courier New',monospace",
      fontWeight:700, marginBottom:-2, minHeight:44 }}>
      {label}
    </button>
  );
}
function ClockBlock({ label, value, color, ariaLabel }) {
  return (
    <div role="timer" aria-label={ariaLabel || `${label}: ${value}`} aria-live="polite">
      <div style={{ fontSize:11, color:TXT_MUTED, letterSpacing:2 }} aria-hidden="true">{label}</div>
      <div style={{ fontSize:24, fontWeight:900, color:color||TXT_PRIMARY, lineHeight:1.1 }} aria-hidden="true">{value}</div>
    </div>
  );
}
function Dot({ color, size=8, label }) {
  return <span aria-hidden="true" style={{ display:"inline-block", width:size, height:size, borderRadius:"50%", background:color, flexShrink:0 }} />;
}
function Row({ label, value, color }) {
  return (
    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:6 }}>
      <span style={{ fontSize:12, color:TXT_MUTED }}>{label}</span>
      <span style={{ fontSize:12, fontWeight:700, color:color||TXT_PRIMARY }}>{value}</span>
    </div>
  );
}
function BigStat({ label, value, color }) {
  return (
    <div style={{ textAlign:"center" }}>
      <div style={{ fontSize:22, fontWeight:900, color:color||COL_DANGER, lineHeight:1 }}>{value}</div>
      <div style={{ fontSize:11, color:TXT_MUTED, marginTop:4, letterSpacing:1 }}>{label}</div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<GokartStrategy />);
  </script>
</body>
