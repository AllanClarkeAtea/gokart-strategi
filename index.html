<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Preact Test</title>
  <style>
    body { background: #0a0a0f; color: #F4F4F8; font-family: monospace; padding: 40px; }
  </style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/preact/10.19.3/preact.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/preact/10.19.3/hooks/hooks.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/htm/3.1.1/htm.umd.js"></script>
<script>
const { h, render } = preact;
const { useState }  = preactHooks;
const html = htm.bind(h);

function App() {
  const [count, setCount] = useState(0);
  return html`
    <div>
      <h1>🏁 Preact + htm fungerer!</h1>
      <p>Teller: ${count}</p>
      <button onClick=${() => setCount(count + 1)}>Klikk meg</button>
    </div>
  `;
}

render(h(App, null), document.getElementById("root"));
</script>
</body>
</html>
